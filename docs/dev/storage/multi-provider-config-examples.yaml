# Multi-Storage Provider Configuration Examples
# This file provides comprehensive examples of how to configure multiple storage providers
# for the Michelangelo blobstore system with MinIO (S3-compatible) and Azure support.

---
# Example 1: Multiple AWS S3 Providers Configuration
# Use this configuration when you need different AWS S3 configurations for different environments
# or when you have multiple AWS accounts/regions to support.

minio:
  # storageProviders: Map of storage provider configurations
  # Keys are used to identify providers (e.g., "aws-sandbox", "aws-prod", "aws-dev")
  # These keys will be referenced in project configurations to specify which storage to use
  storageProviders:

    # AWS Sandbox Environment - Used for development and testing
    # This provider uses environment variables for AWS credentials
    aws-sandbox:
      type: "s3"                              # Provider type - must be "s3" for MinIO/S3 providers
      awsRegion: "us-west-2"                 # AWS region for the S3 bucket
      useEnvAws: true                        # Use AWS credentials from environment variables (AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_SESSION_TOKEN)
      awsEndpointUrl: "s3.amazonaws.com"     # S3 endpoint URL (optional, defaults to s3.amazonaws.com)

    # AWS Production Environment - Uses IAM roles for authentication
    # This configuration is recommended for production workloads running on AWS infrastructure
    aws-prod:
      type: "s3"
      awsRegion: "us-east-1"
      useIam: true                           # Use IAM role-based authentication (recommended for EC2/EKS)
      awsEndpointUrl: "s3.amazonaws.com"

    # AWS Development Environment - Uses static credentials (not recommended for production)
    # This configuration should only be used for local development or CI/CD environments
    aws-dev:
      type: "s3"
      awsRegion: "eu-west-1"
      awsAccessKeyId: "AKIA..."              # Static AWS access key ID
      awsSecretAccessKey: "SECRET..."        # Static AWS secret access key
      awsEndpointUrl: "s3.amazonaws.com"

    # MinIO Local Development - Self-hosted MinIO instance
    # Use this for local development when you don't want to use real AWS S3
    minio-local:
      type: "s3"
      awsRegion: "us-east-1"                 # Can be any region for MinIO
      awsAccessKeyId: "minioadmin"           # MinIO default credentials
      awsSecretAccessKey: "minioadmin"
      awsEndpointUrl: "localhost:9000"       # MinIO server endpoint (HTTP by default)

  # defaultProvider: The provider key to use when no specific provider is requested
  # This should typically be your main/production storage provider
  defaultProvider: "aws-sandbox"

---
# Example 2: Azure Blob Storage Configuration
# Use this configuration to set up Azure Blob Storage providers with different authentication methods

azure:
  # storageProviders: Map of Azure storage provider configurations
  # Keys are used to identify providers and will be referenced in project configurations
  storageProviders:

    # Azure Production Environment with SAS Token Authentication
    # SAS (Shared Access Signature) tokens provide fine-grained access control
    azure-prod:
      type: "azure"                          # Provider type - must be "azure" for Azure providers
      storageAccount: "mlprodstorageacct"    # Azure Storage Account name
      sasToken: "sv=2022-11-02&ss=b&srt=sco&sp=rwdlacupx&se=2024-12-31T23:59:59Z&st=2023-01-01T00:00:00Z&spr=https&sig=..."  # SAS token for authentication
      endpoint: ""                           # Optional: Custom endpoint (defaults to https://{storageAccount}.blob.core.windows.net)

    # Azure Development Environment
    # Typically uses a separate storage account for isolation
    azure-dev:
      type: "azure"
      storageAccount: "mldevstorageacct"
      sasToken: "sv=2022-11-02&ss=b&srt=sco&sp=rwdlacupx&se=2024-12-31T23:59:59Z&st=2023-01-01T00:00:00Z&spr=https&sig=..."

    # Azure with Custom Endpoint (for Azure Stack or custom deployments)
    azure-custom:
      type: "azure"
      storageAccount: "customstorageacct"
      sasToken: "sv=..."
      endpoint: "https://custom.blob.storage.endpoint.net"  # Custom Azure Stack or private cloud endpoint

  # defaultProvider: The provider key to use when no specific provider is requested
  defaultProvider: "azure-prod"

---
# Example 3: Mixed Multi-Provider Configuration
# This example shows how to configure both MinIO/S3 and Azure providers together
# The blobstore system will automatically route requests based on the scheme (s3:// vs abfss://)
# and provider key specified in the request

minio:
  storageProviders:
    aws-prod:
      type: "s3"
      awsRegion: "us-east-1"
      useIam: true
    aws-sandbox:
      type: "s3"
      awsRegion: "us-west-2"
      useEnvAws: true
  defaultProvider: "aws-sandbox"

azure:
  storageProviders:
    azure-prod:
      type: "azure"
      storageAccount: "prodstorageacct"
      sasToken: "sv=..."
    azure-dev:
      type: "azure"
      storageAccount: "devstorageacct"
      sasToken: "sv=..."
  defaultProvider: "azure-prod"

---
# Example Usage in Project Configuration
# Once you have configured storage providers, you can reference them in project specifications:

# Example project configuration snippet:
# apiVersion: v1
# kind: Project
# metadata:
#   name: ml-training-project
#   namespace: ml-team
# spec:
#   # Storage provider key references the configured providers above
#   storageProviderKey: "aws-prod"          # Use the aws-prod S3 configuration
#   computePlatform: "kubernetes"           # Compute platform for the project
#   # ... other project configuration

# URL Examples for different providers:
# - S3/MinIO URLs: "s3://bucket-name/path/to/file.json"
# - Azure URLs: "abfss://container@storageaccount.blob.core.windows.net/path/to/file.json"
# - Azure simplified: "abfss://container/path/to/file.json"

# The blobstore system will:
# 1. Parse the URL scheme (s3 vs abfss) to determine provider type
# 2. Use the project's storageProviderKey to select the specific provider configuration
# 3. Route the request to the appropriate storage client with the correct credentials

---
# Configuration Best Practices:

# Security:
# - Never commit real credentials or SAS tokens to version control
# - Use environment variables or secret management systems for sensitive values
# - Rotate SAS tokens regularly and use short expiration times when possible
# - Use IAM roles instead of static credentials in production environments

# Organization:
# - Use meaningful provider keys that indicate environment (prod, dev, staging)
# - Group providers by environment or team to avoid confusion
# - Document the purpose and usage of each provider configuration

# Performance:
# - Choose regions close to your compute resources to minimize latency
# - Consider using multiple providers for different use cases (e.g., training data vs model artifacts)
# - Monitor storage costs and choose appropriate storage classes/tiers

# Reliability:
# - Configure multiple providers for high availability scenarios
# - Test failover scenarios if implementing provider switching logic
# - Monitor provider health and availability