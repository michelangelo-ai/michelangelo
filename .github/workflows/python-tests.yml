name: Python Tests & Coverage

on:
  pull_request:
    paths:
      - 'python/**'
      - '.github/workflows/python-tests.yml'
  push:
    branches:
      - main
    paths:
      - 'python/**'

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    defaults:
      run:
        working-directory: ./python

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.8.0
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: python/.venv
          key: venv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --extras "dev" --no-interaction --no-root

      - name: Install project
        run: poetry install --extras "dev" --no-interaction

      - name: Run tests with coverage
        run: |
          poetry run pytest \
            --cov=michelangelo \
            --cov-report=xml \
            --cov-report=term \
            --cov-report=html \
            --cov-branch \
            --junitxml=junit.xml \
            -v

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.9'
        uses: codecov/codecov-action@v4
        with:
          file: ./python/coverage.xml
          flags: python
          name: python-${{ matrix.python-version }}
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Coverage comment
        if: github.event_name == 'pull_request' && matrix.python-version == '3.9'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          COVERAGE_PATH: python

      - name: Store coverage HTML report
        if: matrix.python-version == '3.9'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: python/htmlcov/

      - name: Check coverage threshold (baseline: 34.94%)
        if: matrix.python-version == '3.9'
        run: |
          # Baseline coverage is 34.94% - we don't fail on overall coverage
          # New code must meet 90% (enforced in python-coverage.yml via diff-cover)
          poetry run coverage report --fail-under=34
