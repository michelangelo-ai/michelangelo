name: Go Coverage

on:
  pull_request:
    paths:
      - 'go/**/*.go'
      - 'go/**/BUILD.bazel'
      - 'proto/**/*.proto'
      - 'proto/**/BUILD.bazel'
      - '.github/workflows/go-coverage.yml'
  push:
    branches:
      - main
    paths:
      - 'go/**/*.go'

permissions:
  contents: read
  pull-requests: write

jobs:
  test-and-coverage:
    name: Go Test & Coverage (Bazel)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for coverage comparison

      - name: Free disk space for Bazel
        run: |
          echo "Disk space before cleanup:"
          df -h
          # Remove large packages not needed for Go/Bazel builds
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/share/swift
          echo "Disk space after cleanup:"
          df -h

      - name: Mount bazel cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
          key: bazel-coverage-${{ runner.os }}-${{ hashFiles('.bazelversion', 'MODULE.bazel', 'MODULE.bazel.lock') }}
          restore-keys: |
            bazel-coverage-${{ runner.os }}-

      - name: Run tests and generate coverage with Bazel
        run: |
          ./tools/bazel coverage //go/... \
            --combined_report=lcov \
            --instrumentation_filter="//go/[^/]*" \
            --test_output=errors \
            --test_summary=detailed

      - name: Process coverage data
        run: |
          # Install lcov for processing coverage
          sudo apt-get update
          sudo apt-get install -y lcov

          # Find the coverage file
          COVERAGE_FILE=$(find bazel-out -name "_coverage_report.dat" | head -1)

          if [ -z "$COVERAGE_FILE" ]; then
            echo "Coverage file not found, trying alternative location"
            COVERAGE_FILE="bazel-out/_coverage/_coverage_report.dat"
          fi

          if [ -f "$COVERAGE_FILE" ]; then
            echo "Found coverage file: $COVERAGE_FILE"
            cp "$COVERAGE_FILE" coverage.dat

            # Remove external Bazel dependencies from coverage data (if any)
            lcov --remove coverage.dat 'external/*' -o coverage-filtered.dat --ignore-errors unused
            mv coverage-filtered.dat coverage.dat

            # Generate summary
            lcov --summary coverage.dat 2>&1 | tee coverage-summary.txt

            # Extract coverage percentage
            COVERAGE=$(lcov --summary coverage.dat 2>&1 | \
              grep "lines" | head -1 | awk '{print $2}' | sed 's/%//' || echo "0")

            echo "COVERAGE=$COVERAGE" >> $GITHUB_ENV
            echo "Go Coverage: $COVERAGE%"

            # Generate HTML report
            genhtml coverage.dat -o coverage-html --ignore-errors source,unmapped

            # Create coverage.txt for combined workflow (compatible format)
            echo "total: (statements) $COVERAGE%" > coverage.txt
          else
            echo "⚠️  Coverage file not found"
            echo "COVERAGE=0" >> $GITHUB_ENV
            echo "total: (statements) 0%" > coverage.txt
          fi

      - name: "Check coverage threshold (baseline: 60%)"
        run: |
          BASELINE=60
          COVERAGE=${{ env.COVERAGE }}
          COVERAGE_INT=${COVERAGE%.*}

          echo "Coverage: $COVERAGE% (baseline: 60%)"

          if [ "$COVERAGE_INT" -lt "$BASELINE" ]; then
            echo "❌ Coverage $COVERAGE% is below baseline $BASELINE%"
            echo "Coverage should not decrease from baseline"
            exit 1
          else
            echo "✅ Coverage $COVERAGE% meets baseline threshold (60%)"
            echo "📈 Goal: Maintain baseline and enforce 90% on new code"
          fi

      - name: Coverage report PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          header: go-coverage
          message: |
            ## Go Coverage Report (Bazel)

            **Total Coverage:** ${{ env.COVERAGE }}%

            **Coverage Policy:**
            - **Baseline (existing code):** ≥60% (current coverage)
            - **New/changed code:** ≥90% ✅ **STRICTLY ENFORCED**
            - **Long-term goal:** Improve baseline to 90%

            [View detailed HTML report in artifacts](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage-reports
          path: |
            coverage.dat
            coverage.txt
            coverage-html/
            coverage-summary.txt

      - name: Add coverage to job summary
        if: always()
        run: |
          echo "## Go Coverage Report (Bazel)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total Coverage:** ${{ env.COVERAGE }}%" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Coverage Policy" >> $GITHUB_STEP_SUMMARY
          echo "- **Baseline (existing code):** ≥60% (current coverage)" >> $GITHUB_STEP_SUMMARY
          echo "- **New/changed code:** ≥90% ✅ **STRICTLY ENFORCED**" >> $GITHUB_STEP_SUMMARY
          echo "- **Long-term goal:** Improve baseline to 90%" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Running Tests Locally" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "# Test all Go packages" >> $GITHUB_STEP_SUMMARY
          echo "bazel test //go/..." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Get coverage" >> $GITHUB_STEP_SUMMARY
          echo "bazel coverage //go/..." >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          if [ -f "coverage-summary.txt" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Coverage Details" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat coverage-summary.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
