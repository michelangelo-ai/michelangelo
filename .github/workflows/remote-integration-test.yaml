name: Remote Integration test

# Trigger the workflow on push and pull request events for the main branch
on:
  push:
    branches: [ananya/remote-integ-test]
  workflow_dispatch:

jobs:
  boston-housing:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: ./python

    steps:
      #----------------------------------------------
      # Check-out repo
      #----------------------------------------------
      - name: Check out repository
        uses: actions/checkout@v4

      #----------------------------------------------
      # Check system resources
      #----------------------------------------------
      - name: Check system resources
        run: |
          echo "=== System Resources ==="
          echo "CPU Cores: $(nproc)"
          echo "Memory: $(free -h | grep Mem | awk '{print $2}')"
          echo "Available Memory: $(free -h | grep Mem | awk '{print $7}')"
          echo "Disk Space: $(df -h / | tail -1 | awk '{print $4}')"

      #----------------------------------------------
      # Clean up Docker
      #----------------------------------------------
      - name: Clean up Docker
        run: |
          docker system prune -f
          docker image prune -f

      #----------------------------------------------
      # Build docker image
      #----------------------------------------------
      - name: Build docker image
        run: |
          echo "Starting Docker build..."
          echo "Current directory: $(pwd)"
          echo "Directory contents:"
          ls -la
          echo "Python directory contents:"
          ls -la python/ || echo "Python directory not found"
          
          # Try building from the correct context
          docker build -t ma-it-examples -f examples/Dockerfile .

          if [ $? -eq 0 ]; then
            echo "Docker build successful!"
          else
            echo "Docker build failed!"
            exit 1
          fi

      #----------------------------------------------
      # Check docker image
      #----------------------------------------------
      - name: Check docker image
        run: |
          docker image ls
          docker images ma-it-examples --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}"

      #----------------------------------------------
      # Run test
      #----------------------------------------------
      - name: Run pipeline
        run: |
          echo "Starting Boston Housing XGBoost pipeline..."
          # Boston Housing uses much less memory than BERT
          docker run --rm --memory=3g --cpus=1 --shm-size=256m ma-it-examples poetry run python examples/boston_housing_xgb/boston_housing_xgb.py
