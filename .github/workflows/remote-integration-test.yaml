name: Remote Integration test

# Trigger the workflow on push and pull request events for the main branch
on:
  push:
    branches: [ananya/remote-integ-test]
  workflow_dispatch:

jobs:
  bert-cola-remote:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: ./python

    steps:
      #----------------------------------------------
      # Check-out repo
      #----------------------------------------------
      - name: Check out repository
        uses: actions/checkout@v4

      #----------------------------------------------
      # Build docker image
      #----------------------------------------------
      - name: Build docker image
        run: docker build -t ma-it-examples -f ./examples/Dockerfile .
      - name: Check docker image
        run: docker image ls

      #----------------------------------------------
      # Run test
      #----------------------------------------------
      - name: Run pipeline
        run: |
          # Debug: Show current directory
          echo "=== PRE-PIPELINE DEBUG INFO ==="
          echo "Current working directory: $(pwd)"
          echo "Home directory: $HOME"
          
          # Create persistent directory with date timestamp (outside repository)
          TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
          PERSISTENT_DIR="$HOME/michelangelo_data"
          mkdir -p "$PERSISTENT_DIR"
          
          # Create dated folder for this run
          DATED_FOLDER="$PERSISTENT_DIR/bert_cola_$TIMESTAMP"
          mkdir -p "$DATED_FOLDER"
          
          # Run with volume mount for bert_cola directory
          docker run --rm \
            -v "$DATED_FOLDER:/app/bert_cola" \
            -e DATA_SIZE=10 \
            ma-it-examples poetry run python ./examples/bert_cola/bert_cola.py
          
          # Show results
          echo "Pipeline completed. Results saved to: $DATED_FOLDER"
          ls -la "$DATED_FOLDER/"
          