name: Remote Integration test

# Trigger the workflow on push and pull request events for the main branch
on:
  push:
    branches: [ananya/remote-integ-test]
  workflow_dispatch:

jobs:
  bert-cola-remote:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: ./python

    steps:
      #----------------------------------------------
      # Clean up persistent data
      #----------------------------------------------
      - name: Clean up persistent data
        run: |
          # Remove the persistent directory from /tmp
          sudo rm -rf /tmp/bert_cola_persistent/ 2>/dev/null || true

      #----------------------------------------------
      # Check-out repo
      #----------------------------------------------
      - name: Check out repository
        uses: actions/checkout@v4

      #----------------------------------------------
      # Build docker image
      #----------------------------------------------
      - name: Build docker image
        run: docker build -t ma-it-examples -f ./examples/Dockerfile .
      - name: Check docker image
        run: docker image ls

      #----------------------------------------------
      # Run test
      #----------------------------------------------
      - name: Run pipeline
        run: |
          # Debug: Show current directory and user
          echo "=== PRE-PIPELINE DEBUG INFO ==="
          echo "Current working directory: $(pwd)"
          echo "Current user: $(whoami)"
          echo "Home directory: $HOME"
          
          # Create persistent directory with date timestamp
          TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
          PERSISTENT_DIR="$(pwd)/bert_cola_persistent"
          mkdir -p "$PERSISTENT_DIR"
          
          # Create dated folder for this run
          DATED_FOLDER="$PERSISTENT_DIR/bert_cola_$TIMESTAMP"
          mkdir -p "$DATED_FOLDER"
          
          # Debug: Show what was created
          echo "Created dated directory at: $DATED_FOLDER"
          ls -la "$DATED_FOLDER/"
          
          # Debug: Show current directory contents
          echo "Current directory contents before pipeline:"
          ls -la
          
          # Run with volume mount for bert_cola directory
          echo "=== STARTING PIPELINE ==="
          docker run --rm \
            -v "$DATED_FOLDER:/app/bert_cola" \
            -e DATA_SIZE=10 \
            ma-it-examples bash -c "
              poetry run python ./examples/bert_cola/bert_cola.py
              chown -R 1000:1000 /app/bert_cola/
            "
          
          # Debug: Check what was created after pipeline
          echo "=== POST-PIPELINE DEBUG INFO ==="
          echo "Contents of dated folder after pipeline:"
          ls -la "$DATED_FOLDER/"
          
          echo "Contents of persistent_data directory:"
          ls -la "$PERSISTENT_DIR/"
          
          echo "Checking for bert_cola directories:"
          find "$PERSISTENT_DIR" -name "bert_cola*" -type d 2>/dev/null
          
          echo "Checking for model files:"
          find "$PERSISTENT_DIR" -name "pytorch_model.bin" 2>/dev/null
          find "$PERSISTENT_DIR" -name "config.json" 2>/dev/null
          find "$PERSISTENT_DIR" -name "checkpoint*" -type d 2>/dev/null
          
          echo "Checking for recently modified files (last 10 minutes):"
          find "$PERSISTENT_DIR" -type f -mmin -10 2>/dev/null
          
          echo "Checking for any files with 'bert' in name:"
          find "$PERSISTENT_DIR" -name "*bert*" -type f 2>/dev/null
          
          echo "=== END DEBUG INFO ==="
          