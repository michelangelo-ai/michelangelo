name: Remote Integration test

# Trigger the workflow on push and pull request events for the main branch
on:
  push:
    branches: [ananya/remote-integ-test]
  workflow_dispatch:

jobs:
  bert-cola-remote:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: ./python

    steps:
      #----------------------------------------------
      # Check-out repo
      #----------------------------------------------
      - name: Check out repository
        uses: actions/checkout@v4

      #----------------------------------------------
      # Build docker image
      #----------------------------------------------
      - name: Build docker image
        run: docker build -t ma-it-examples -f ./examples/Dockerfile .
      - name: Check docker image
        run: docker image ls

      #----------------------------------------------
      # Run test
      #----------------------------------------------
      - name: Run pipeline
        run: |
          # Create persistent directory
          mkdir -p /home/runner/persistent_data
          
          # Run with volume mount
          docker run --rm \
            -v /home/runner/persistent_data:/app/persistent_data \
            -e OUTPUT_DIR=/app/persistent_data/bert_cola \
            ma-it-examples poetry run python ./examples/bert_cola/bert_cola.py