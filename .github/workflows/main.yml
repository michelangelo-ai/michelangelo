name: Bazel Test

# Trigger the workflow on push and pull request events for the main branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout Repository
        uses: actions/checkout@v3

      # # Set up Java (Bazel requires Java)
      # - name: Set up JDK 11
      #   uses: actions/setup-java@v3
      #   with:
      #     distribution: 'temurin'
      #     java-version: '11'

      # # Install Bazel
      # - name: Install Bazel
      #   uses: bazelbuild/setup-bazel@v6.0.0  # Updated to v6.0.0

      # Run Bazel tests
      - name: Run Bazel Test
        run: ./tools/bazel test ...
