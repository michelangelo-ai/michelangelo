name: Bazel Test

# Trigger the workflow on push and pull request events for the main branch
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  bazel-build:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Cache Bazel outputs
      - name: Cache Bazel Outputs
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
          key: bazel_cache_root
          restore-keys: |
            bazel_cache_root

      # Run Bazel tests
      - name: Run Bazel Test
        run: ./tools/bazel test ...

  python-build:
    runs-on: ubuntu-latest

    steps:
      # Reference
      # https://github.com/marketplace/actions/install-poetry-action

      #----------------------------------------------
      #       check-out repo and set-up python
      #----------------------------------------------
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      #----------------------------------------------
      #              Move to python dir
      #----------------------------------------------
      - name: Run tests
        run: |
          cd python
      #----------------------------------------------
      #  -----  install & configure poetry  -----
      #----------------------------------------------
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true
          virtualenvs-path: .venv
          installer-parallel: true
      #----------------------------------------------
      #       load cached venv if cache exists
      #----------------------------------------------
      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/poetry.lock') }}
      #----------------------------------------------
      # install dependencies if cache does not exist
      #----------------------------------------------
      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --no-interaction --no-root
      #----------------------------------------------
      # install your root project, if required
      #----------------------------------------------
      - name: Install project
        run: poetry install --no-interaction
      #----------------------------------------------
      #              run test suite
      #----------------------------------------------
      - name: Run tests
        run: |
          poetry run pytest


  dirty-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Cache Bazel outputs to speed up Bazel commands
      - name: Cache Bazel Outputs
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
          key: bazel_cache_root
          restore-keys: |
            bazel_cache_root

      - name: Run Gazelle
        run: |
          tools/gazelle
          git diff --exit-code || (echo "BUILD.bazel files are not up to date. Please run gazelle before commit." && exit 1)

      - name: Check Go dependencies
        run: |
          cd go && ../tools/go mod tidy
          git diff --exit-code || (echo "go.mod or go.sum files are not up to date. Please run go mod tidy before commit." && exit 1)

      - name: Format Go files
        run: |
          tools/goimports -w go
          git diff --exit-code || (echo "Go files are not formatted. Please run goimports before commit." && exit 1)
