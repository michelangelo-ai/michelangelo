name: Bazel Test

# Trigger the workflow on push and pull request events for the main branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Run Bazel tests
      - name: Run Bazel Test
        run: ./tools/bazel test ...
