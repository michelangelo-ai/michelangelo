name: Bazel Test

# Trigger the workflow on push and pull request events for the main branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Set up Java (Bazel requires Java)
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'

      # Install Bazel
      - name: Install Bazel
        uses: bazelbuild/setup-bazel@v5
        with:
          bazel-version: '6.0.0'  # Specify the Bazel version you need

      # (Optional) Cache Bazel outputs to speed up builds
      - name: Cache Bazel
        uses: actions/cache@v3
        with:
          path: |
            ~/cache/bazel
            /home/runner/.cache/bazel
          key: ${{ runner.os }}-bazel-${{ hashFiles('**/WORKSPACE') }}
          restore-keys: |
            ${{ runner.os }}-bazel-

      # Run Bazel tests
      - name: Run Bazel Test
        run: bazel test ...
