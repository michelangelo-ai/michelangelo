name: Integration test

# Trigger the workflow on push and pull request events for the main branch
on:
  workflow_dispatch:

jobs:
  bert-cola-local:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: ./python

    steps:
      #----------------------------------------------
      # Check-out repo
      #----------------------------------------------
      - name: Check out repository
        uses: actions/checkout@v4

      #----------------------------------------------
      # Check system resources
      #----------------------------------------------
      - name: Check system resources
        run: |
          echo "=== System Resources ==="
          echo "CPU Cores: $(nproc)"
          echo "Memory: $(free -h | grep Mem | awk '{print $2}')"
          echo "Available Memory: $(free -h | grep Mem | awk '{print $7}')"
          echo "Disk Space: $(df -h / | tail -1 | awk '{print $4}')"

      #----------------------------------------------
      # Clean up Docker
      #----------------------------------------------
      - name: Clean up Docker
        run: |
          docker system prune -f
          docker image prune -f

      #----------------------------------------------
      # Build docker image
      #----------------------------------------------
      - name: Build docker image
        run: |
          echo "Starting Docker build..."
          # Fixed build context
          docker build --memory=6g --cpus=1.5 -t ma-it-examples -f ./examples/Dockerfile ./python
          
          if [ $? -eq 0 ]; then
            echo "✅ Docker build successful!"
          else
            echo "❌ Docker build failed!"
            exit 1
          fi

      #----------------------------------------------
      # Check docker image
      #----------------------------------------------
      - name: Check docker image
        run: |
          docker image ls
          docker images ma-it-examples --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}"

      #----------------------------------------------
      # Run test
      #----------------------------------------------
      - name: Run pipeline
        run: |
          echo "Starting BERT CoLA pipeline..."
          docker run --rm --memory=4g --cpus=1 ma-it-examples poetry run python ./examples/bert_cola/bert_cola.py
