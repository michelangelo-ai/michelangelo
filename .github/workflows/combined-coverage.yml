name: Combined Coverage Report

on:
  workflow_run:
    workflows: ["JavaScript Coverage", "Python Coverage Check", "Go Coverage"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  statuses: write
  actions: read

jobs:
  aggregate-coverage:
    name: Aggregate All Coverage
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get PR number
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          PULL_REQUESTS_JSON: ${{ toJSON(github.event.workflow_run.pull_requests) }}
        run: |
          PR_NUMBER=$(echo "$PULL_REQUESTS_JSON" | jq -r '.[0].number // empty')
          if [ -z "$PR_NUMBER" ]; then
            PR_NUMBER=$(gh pr list --head "$HEAD_BRANCH" --json number --jq '.[0].number' 2>/dev/null || echo "")
          fi
          if [ -z "$PR_NUMBER" ]; then
            echo "Could not determine PR number, skipping"
            exit 1
          fi
          echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT

      - name: Find latest coverage runs for this branch
        id: runs
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          get_run_id() {
            gh api "repos/${{ github.repository }}/actions/workflows/$1/runs?branch=${HEAD_BRANCH}&status=completed&per_page=1" \
              --jq '.workflow_runs[0].id // empty'
          }
          echo "python=$(get_run_id python-coverage.yml)" >> $GITHUB_OUTPUT
          echo "go=$(get_run_id go-coverage.yml)" >> $GITHUB_OUTPUT
          echo "js=$(get_run_id javascript-coverage.yml)" >> $GITHUB_OUTPUT

      - name: Download Python coverage
        if: steps.runs.outputs.python != ''
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: python-coverage.yml
          run_id: ${{ steps.runs.outputs.python }}
          name: coverage-reports
          path: ./coverage-reports/python
          if_no_artifact_found: warn

      - name: Download Go coverage
        if: steps.runs.outputs.go != ''
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: go-coverage.yml
          run_id: ${{ steps.runs.outputs.go }}
          name: go-coverage-reports
          path: ./coverage-reports/go
          if_no_artifact_found: warn

      - name: Download JavaScript coverage
        if: steps.runs.outputs.js != ''
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: javascript-coverage.yml
          run_id: ${{ steps.runs.outputs.js }}
          name: javascript-coverage-reports
          path: ./coverage-reports/javascript
          if_no_artifact_found: warn

      - name: Extract coverage metrics
        id: metrics
        run: |
          # Python coverage
          if [ -f "coverage-reports/python/coverage.json" ]; then
            PYTHON_COV=$(python3 -c "import json; print(json.load(open('coverage-reports/python/coverage.json'))['totals']['percent_covered_display'])" 2>/dev/null || echo "N/A")
            PYTHON_NOTE=""
          else
            PYTHON_COV="N/A"
            PYTHON_NOTE=" (no coverage data)"
          fi

          # Go coverage
          if [ -f "coverage-reports/go/coverage.txt" ]; then
            GO_COV=$(grep "total:" coverage-reports/go/coverage.txt | awk '{print $3}' | sed 's/%//' || echo "N/A")
            GO_NOTE=""
          else
            GO_COV="N/A"
            GO_NOTE=" (no coverage data)"
          fi

          # JavaScript coverage
          if [ -f "coverage-reports/javascript/coverage-summary.json" ]; then
            JS_COV=$(node -p "require('./coverage-reports/javascript/coverage-summary.json').total.lines.pct" 2>/dev/null || echo "N/A")
            JS_NOTE=""
          else
            JS_COV="N/A"
            JS_NOTE=" (no coverage data)"
          fi

          echo "PYTHON_COVERAGE=$PYTHON_COV" >> $GITHUB_ENV
          echo "PYTHON_NOTE=$PYTHON_NOTE" >> $GITHUB_ENV
          echo "GO_COVERAGE=$GO_COV" >> $GITHUB_ENV
          echo "GO_NOTE=$GO_NOTE" >> $GITHUB_ENV
          echo "JS_COVERAGE=$JS_COV" >> $GITHUB_ENV
          echo "JS_NOTE=$JS_NOTE" >> $GITHUB_ENV

      - name: Create combined coverage report
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: combined-coverage
          number: ${{ steps.pr.outputs.number }}
          message: |
            ## 📊 Combined Coverage Report

            | Component | Coverage | Baseline | New Code | Status |
            |-----------|----------|----------|----------|--------|
            | 🐍 Python | ${{ env.PYTHON_COVERAGE }}%${{ env.PYTHON_NOTE }} | ≥70% | ≥90% ✅ | ${{ env.PYTHON_COVERAGE != 'N/A' && '✅' || '⏭️' }} |
            | 🐹 Go | ${{ env.GO_COVERAGE }}%${{ env.GO_NOTE }} | ≥60% | ≥90% ✅ | ${{ env.GO_COVERAGE != 'N/A' && '✅' || '⏭️' }} |
            | 📜 JavaScript | ${{ env.JS_COVERAGE }}%${{ env.JS_NOTE }} | ≥78.74% | ≥90% ✅ | ${{ env.JS_COVERAGE != 'N/A' && '✅' || '⏭️' }} |

            ---

            ### Coverage Policy

            **Baseline (Existing Code):**
            - Python: ≥70% (current coverage)
            - Go: ≥60% (current coverage)
            - JavaScript: ≥78.74% (current coverage)

            **New/Changed Code:** ≥90% **STRICTLY ENFORCED**

            **Long-term Goal:** Maintain and improve coverage baselines

            ---

            <details>
            <summary>📝 Coverage Guidelines</summary>

            - All new code must include tests
            - Coverage should not decrease from the base branch
            - Use `# pragma: no cover` sparingly for truly untestable code
            - Aim for meaningful tests, not just coverage numbers

            </details>

            <details>
            <summary>🔗 Quick Links</summary>

            - [Python Coverage Details](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - [Go Coverage Details](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - [Coverage Artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

            </details>

      - name: Generate combined summary
        if: always()
        run: |
          echo "# 📊 Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Coverage by Component" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Coverage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Python | ${{ env.PYTHON_COVERAGE }}% | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Go | ${{ env.GO_COVERAGE }}% | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| JavaScript | ${{ env.JS_COVERAGE }}% | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Coverage Policy" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Baseline (Existing Code)" >> $GITHUB_STEP_SUMMARY
          echo "- Python: ≥70%" >> $GITHUB_STEP_SUMMARY
          echo "- Go: ≥60%" >> $GITHUB_STEP_SUMMARY
          echo "- JavaScript: ≥78.74%" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### New/Changed Code" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ All languages: ≥90% **STRICTLY ENFORCED**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Long-term Goal" >> $GITHUB_STEP_SUMMARY
          echo "- Maintain and improve coverage baselines" >> $GITHUB_STEP_SUMMARY
