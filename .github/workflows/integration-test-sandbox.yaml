name: Sandbox integration tests

on:
  workflow_run:
    workflows: ["Build examples Docker image"]
    types: [completed]
  workflow_dispatch:
    inputs:
      image_tag:
        description: >
          GHCR examples image tag to use as the task image.
          Use your branch name or a sha- tag to test a branch build.
          Defaults to "latest" (built from main).
        required: false
        default: "latest"
  workflow_call:
    inputs:
      image_tag:
        description: "GHCR examples image tag"
        required: false
        type: string
        default: "latest"
  schedule:
    - cron: "0 3 * * *"   # 03:00 UTC every day

env:
  REGISTRY: ghcr.io

jobs:
  sandbox-e2e:
    # For workflow_run: only proceed if the triggering build succeeded.
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: read
    defaults:
      run:
        working-directory: ./python

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Compute the image tag: use the input if provided, otherwise derive from branch/event.
      - name: Compute image tag
        id: tag
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "value=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            branch="${{ github.event.workflow_run.head_branch }}"
            # Sanitize: replace '/' with '-' to match docker/metadata-action branch tag
            tag="${branch//\//-}"
            echo "value=${tag}" >> "$GITHUB_OUTPUT"
          else
            echo "value=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python + Poetry
        uses: ./.github/actions/setup-python-poetry

      - name: Install k3d
        run: curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      # Pull pre-built examples image from GHCR (built by build-examples-image.yaml).
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull examples image
        run: docker pull ghcr.io/${{ github.repository_owner }}/examples:${{ steps.tag.outputs.value }}

      - name: Tag image as examples:latest
        run: docker tag ghcr.io/${{ github.repository_owner }}/examples:${{ steps.tag.outputs.value }} docker.io/library/examples:latest

      # Create the k3d sandbox with all services.
      - name: Create sandbox
        run: poetry run ma sandbox create --workflow cadence

      # Import image so IMAGE_PULL_POLICY=Never works inside k3d.
      - name: Import image into k3d
        run: k3d image import docker.io/library/examples:latest --cluster michelangelo-sandbox

      # Run the integration test script.
      - name: Run integration tests
        run: |
          source .venv/bin/activate
          ../.github/scripts/integration-test.sh
        env:
          MA_NAMESPACE: ma-dev-test
          MA_IT_IMAGE: docker.io/library/examples:latest
          POLL_INTERVAL: "30"
          TIMEOUT: "1800"

      - name: Delete sandbox
        if: always()
        run: poetry run ma sandbox delete
