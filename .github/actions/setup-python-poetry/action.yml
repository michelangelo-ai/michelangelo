name: 'Setup Python and Poetry'
description: 'Checkout repository, setup Python, install Poetry, cache dependencies, and install project dependencies'

inputs:
  python-version:
    description: 'Python version to setup'
    required: false
    default: '3.9'
  working-directory:
    description: 'Working directory for Poetry operations'
    required: false
    default: './python'
  install-root-project:
    description: 'Whether to install the root project'
    required: false
    default: 'true'
  poetry-version:
    description: 'Poetry version to install'
    required: false
    default: 'latest'

runs:
  using: composite
  steps:
    #----------------------------------------------
    #       check-out repo and set-up python
    #----------------------------------------------
    - name: Check out repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch full history for git operations

    - name: Set up python
      id: setup-python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    #----------------------------------------------
    #  -----  install & configure poetry  -----
    #----------------------------------------------
    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: ${{ inputs.poetry-version }}
        virtualenvs-create: true
        virtualenvs-in-project: true
        virtualenvs-path: .venv
        installer-parallel: true

    #----------------------------------------------
    #       load cached venv if cache exists
    #----------------------------------------------
    - name: Load cached venv
      id: cached-poetry-dependencies
      uses: actions/cache@v4
      with:
        path: ${{ inputs.working-directory }}/.venv
        key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles(format('{0}/**/poetry.lock', inputs.working-directory)) }}

    #----------------------------------------------
    # install dependencies if cache does not exist
    #----------------------------------------------
    - name: Install dependencies
      if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: poetry install --no-interaction --no-root -E dev

    #----------------------------------------------
    # install your root project, if required
    #----------------------------------------------
    - name: Install project
      if: inputs.install-root-project == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: poetry install --no-interaction -E dev
