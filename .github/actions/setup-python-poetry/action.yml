name: 'Setup Python and Poetry'
description: 'Setup Python, install Poetry, cache dependencies, and install project dependencies'

inputs:
  python-version:
    description: 'Python version to setup'
    required: false
    default: '3.9'
  working-directory:
    description: 'Working directory for Poetry operations'
    required: false
    default: './python'
  install-root-project:
    description: 'Whether to install the root project'
    required: false
    default: 'true'
  poetry-version:
    description: 'Poetry version to install'
    required: false
    default: 'latest'

runs:
  using: composite
  steps:
    #----------------------------------------------
    #       set-up python
    #----------------------------------------------
    - name: Set up python
      id: setup-python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    #----------------------------------------------
    #  -----  install & configure poetry  -----
    #----------------------------------------------
    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: ${{ inputs.poetry-version }}
        virtualenvs-create: true
        virtualenvs-in-project: true
        virtualenvs-path: .venv
        installer-parallel: true
        plugins: poetry-dynamic-versioning[plugin]

    #----------------------------------------------
    #       free up disk space
    #----------------------------------------------
    - name: Free up disk space
      shell: bash
      run: |
        echo "=== Before cleanup ==="
        df -h

        # Remove large unused packages
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/share/boost
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"

        # Clean up docker images
        docker rmi $(docker images -q) || true

        # Clean apt cache
        sudo apt-get clean

        echo "=== After cleanup ==="
        df -h

    #----------------------------------------------
    #       load cached venv if cache exists
    #----------------------------------------------
    - name: Load cached venv
      id: cached-poetry-dependencies
      uses: actions/cache@v4
      with:
        path: ${{ inputs.working-directory }}/.venv
        key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles(format('{0}/**/poetry.lock', inputs.working-directory)) }}

    #----------------------------------------------
    # install dependencies if cache does not exist
    #----------------------------------------------
    - name: Install dependencies
      if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: poetry install --no-interaction --no-root -E dev

    #----------------------------------------------
    # install your root project, if required
    #----------------------------------------------
    - name: Install project
      if: inputs.install-root-project == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: poetry install --no-interaction -E dev
