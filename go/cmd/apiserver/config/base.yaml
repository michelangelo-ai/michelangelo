apiserver:
  yarpc:
    host: "localhost"
    port: 14566
  crdSync:
    enableCRDUpdate: true
    enableIncompatibleUpdate: false
    enableCRDDeletion: true
    crdVersions:
      project:
        versions: [v2]
        storageVersion: v2

k8s:
  qps: 300
  burst: 600
metadataStorage:
  enableMetadataStorage: false

# Multi-provider storage configuration
# Uncomment and configure the providers you need
# minio:
#   storageProviders:
#     # Local MinIO instance for development
#     minio-local:
#       type: "s3"
#       awsRegion: "us-east-1"
#       awsAccessKeyId: "minioadmin"
#       awsSecretAccessKey: "minioadmin"
#       awsEndpointUrl: "localhost:9091"
#
#     # AWS Sandbox Environment with environment credentials
#     aws-sandbox:
#       type: "s3"
#       awsRegion: "us-west-2"
#       useEnvAws: true
#
#     # AWS Production Environment with IAM role authentication
#     aws-prod:
#       type: "s3"
#       awsRegion: "us-east-1"
#       useIam: true
#
#     # AWS Development Environment with static credentials
#     aws-dev:
#       type: "s3"
#       awsRegion: "eu-west-1"
#       awsAccessKeyId: "AKIA..."
#       awsSecretAccessKey: "SECRET..."
#
#   # Default provider - change to your preferred provider
#   defaultProvider: "aws-sandbox"

# Azure Blob Storage configuration (uncomment if needed)
# azure:
#   storageProviders:
#     # Azure Production Environment
#     azure-prod:
#       type: "azure"
#       azureStorageAccount: "prodstorageacct"
#       azureSASToken: "sv=2022-11-02&ss=b&srt=sco&sp=rwdlacupx&se=2024-12-31T23:59:59Z..."
#
#     # Azure Development Environment
#     azure-dev:
#       type: "azure"
#       azureStorageAccount: "devstorageacct"
#       azureSASToken: "sv=..."
#
#   # Default Azure provider
#   defaultProvider: "azure-prod"
