apiserver:
  yarpc:
    host: "localhost"
    port: 14566
  crdSync:
    enableCRDUpdate: true
    enableCRDDeletion: true
    crdVersions:
      project:
        versions: [v2, v2alpha1]
        storageVersion: v2

webhook:
  host: "0.0.0.0"
  port: 9443
  certDir: "go/api/webhook/certs"  # Generate certs by running: ./go/api/webhook/generate-certs.sh
  url: "https://localhost:9443"

k8s:
  qps: 300
  burst: 600
metadataStorage:
  enableMetadataStorage: false
