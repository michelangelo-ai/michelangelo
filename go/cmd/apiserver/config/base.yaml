apiserver:
  yarpc:
    host: "localhost"
    port: 14567
  crdSync:
    enableCRDUpdate: true
    enableCRDDeletion: true
    skipIncompatibleCheck: true
    crdVersions:
      project:
        versions: [v2]
        storageVersion: v2

k8s:
  qps: 300
  burst: 600
metadataStorage:
  enableMetadataStorage: false

minio:
  awsRegion: us-east-1
  awsAccessKeyId: minioadmin
  awsSecretAccessKey: minioadmin
  awsEndpointUrl: localhost:9091

blobStorage:
  enabled: true
  bucketName: entities
  enabledCRDs:
    pipelinerun: true
