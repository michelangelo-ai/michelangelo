worker:
  address: localhost:14566
  maApiServiceName: ma-apiserver

logging:
  level: info
  development: true
  encoding: console

workflow-engine:
  # for cadence
  host: 127.0.0.1:7833
  # for temporal
#  host: 127.0.0.1:7233
  transport: grpc
  # for cadence
  provider: cadence
    # for temporal
#  provider: temporal
  workers:
    - domain: default
      taskList: default
    - domain: default
      taskList: trigger_run
  client:
    domain: default

# Multi-provider storage configuration
# Uncomment and configure the providers you need
minio:
  storageProviders:
    # Local MinIO instance for development
    minio-local:
      type: "s3"
      awsRegion: "us-east-1"
      awsAccessKeyId: "minioadmin"
      awsSecretAccessKey: "minioadmin"
      awsEndpointUrl: "localhost:9091"

    # AWS Sandbox Environment with environment credentials
    # aws-sandbox:
    #   type: "s3"
    #   awsRegion: "us-west-2"
    #   useEnvAws: true

    # AWS Production Environment with IAM role authentication
    # aws-prod:
    #   type: "s3"
    #   awsRegion: "us-east-1"
    #   useIam: true

    # AWS Development Environment with static credentials
    # aws-dev:
    #   type: "s3"
    #   awsRegion: "eu-west-1"
    #   awsAccessKeyId: "AKIA..."
    #   awsSecretAccessKey: "SECRET..."

  # Default provider - change to your preferred provider
  defaultProvider: "minio-local"

