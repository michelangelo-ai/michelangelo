worker:
  address: localhost:14567
  maApiServiceName: ma-apiserver

logging:
  level: info
  development: true
  encoding: console

workflow-engine:
  # for cadence
  host: 127.0.0.1:7833
  # for temporal
#  host: 127.0.0.1:7233
  transport: grpc
  # for cadence
  provider: cadence
    # for temporal
#  provider: temporal
  workers:
    - domain: default
      taskList: default
    - domain: default
      taskList: trigger_run
  client:
    domain: default

# Multi-provider storage configuration
# Each storage type (minio, azure, gcp) directly contains an array of providers
# This enables clean separation and type-specific client initialization

# MinIO/S3-compatible storage providers
minio:
  - name: "minio-local"
    awsRegion: "us-east-1"
    awsAccessKeyId: "minioadmin"
    awsSecretAccessKey: "minioadmin"
    awsEndpointUrl: "localhost:9091"
    default: true
