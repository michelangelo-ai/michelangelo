controllermgr:
  metricsBindAddress: ${METRICS_ADDRESS::8091}
  healthProbeBindAddress: ${HEALTH_ADDRESS::8081}
  leaderElection: false
  leaderElectionID: decaf1259.michelangelo.uber.com

workflowClient:
  service: cadence-frontend
  host: michelangelo-worker:7833
  transport: grpc
  domain: default
  # taskList is a used as a fallback if project.Metatdata.Annotations["michelangelo/worker_queue"] is empty
  taskList: default # TODO: MaCTL support for adding project.Metatdata.Annotations["michelangelo/worker_queue"] to project CRD
    
k8s:
  qps: 300
  burst: 600
metadataStorage:
  enableMetadataStorage: false

controllers:
  rayCluster:
    k8sQps: 300
    k8sBurst: 600

minio:
  awsRegion: us-east-1
  awsAccessKeyId: minioadmin
  awsSecretAccessKey: minioadmin
  awsEndpointUrl: minio:9091
