controllermgr:
  metricsBindAddress: ${METRICS_ADDRESS::8091}
  healthProbeBindAddress: ${HEALTH_ADDRESS::8083}
  leaderElection: false
  leaderElectionID: decaf1259.michelangelo.uber.com

workflowClient:
  service: cadence-frontend
  host: localhost:7833
  transport: grpc
  domain: default
  # taskList is a used as a fallback if project.Metatdata.Annotations["michelangelo/worker_queue"] is empty
  taskList: default # TODO(#934): MaCTL support for adding project.Metatdata.Annotations["michelangelo/worker_queue"] to project CRD
  executionUrlFormat: http://localhost:8088/namespaces/{{.Domain}}/workflows/{{.ExecutionID}}
    
k8s:
  qps: 300
  burst: 600
metadataStorage:
  enableMetadataStorage: false

ingester:
  concurrentReconciles: 1
  requeuePeriod: 30s
  # deletionDelayMap:
  #   Model: 15s

controllers:
  rayCluster:
    k8sQps: 300
    k8sBurst: 600

minio:
  awsRegion: us-east-1
  awsAccessKeyId: minioadmin
  awsSecretAccessKey: minioadmin
  awsEndpointUrl: localhost:9091