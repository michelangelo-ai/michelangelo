controllermgr:
  metricsBindAddress: ${METRICS_ADDRESS::8082}
  healthProbeBindAddress: ${HEALTH_ADDRESS::8083}
  leaderElection: false
  leaderElectionID: decaf1259.michelangelo.uber.com

workflowClient:
  service: cadence-frontend
  host: michelangelo-worker:7833
  transport: grpc
  domain: default

k8s:
  qps: 300
  burst: 600
metadataStorage:
  enableMetadataStorage: false

controllers:
  rayCluster:
    k8sQps: 300
    k8sBurst: 600

# Multi-provider storage configuration
# Each storage type (minio, azure, gcp) directly contains an array of providers
# This enables clean separation and type-specific client initialization

# MinIO/S3-compatible storage providers
minio:
  - name: "minio-local"
    awsRegion: "us-east-1"
    awsAccessKeyId: "minioadmin"
    awsSecretAccessKey: "minioadmin"
    awsEndpointUrl: "minio:9091"
    default: true

