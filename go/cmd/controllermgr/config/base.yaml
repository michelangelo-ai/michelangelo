controllermgr:
  metricsBindAddress: ${METRICS_ADDRESS::8091}
  healthProbeBindAddress: ${HEALTH_ADDRESS::8083}
  leaderElection: false
  leaderElectionID: decaf1259.michelangelo.uber.com

workflowClient:
  service: cadence-frontend
  host: localhost:7233
  transport: grpc
  domain: default
  provider: Temporal
  # taskList is a used as a fallback if project.Metatdata.Annotations["michelangelo/worker_queue"] is empty
  taskList: default # TODO: MaCTL support for adding project.Metatdata.Annotations["michelangelo/worker_queue"] to project CRD
  executionUrlFormat: http://localhost:8088/namespaces/{{.Domain}}/workflows/{{.ExecutionID}}
    
k8s:
  qps: 300
  burst: 600
metadataStorage:
  enableMetadataStorage: true

mysql:
  host: localhost
  port: 3306
  user: root
  password: root
  database: michelangelo

controllers:
  rayCluster:
    k8sQps: 300
    k8sBurst: 600

minio:
  awsRegion: us-east-1
  awsAccessKeyId: minioadmin
  awsSecretAccessKey: minioadmin
  awsEndpointUrl: localhost:9091

blobStorage:
  enabled: true
  bucketName: entities
  enabledCRDs:
    pipelinerun: true