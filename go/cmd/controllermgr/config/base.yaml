controllermgr:
  metricsBindAddress: ${METRICS_ADDRESS::8091}
  healthProbeBindAddress: ${HEALTH_ADDRESS::8081}
  leaderElection: false
  leaderElectionID: decaf1259.michelangelo.uber.com

workflowClient:
  service: cadence-frontend
  host: michelangelo-worker:7833
  transport: grpc
  domain: default

k8s:
  qps: 300
  burst: 600
metadataStorage:
  enableMetadataStorage: false

controllers:
  rayCluster:
    k8sQps: 300
    k8sBurst: 600

# Multi-provider storage configuration
# Uncomment and configure the providers you need
minio:
  storageProviders:
    # Local MinIO instance for development
    minio-local:
      type: "s3"
      awsRegion: "us-east-1"
      awsAccessKeyId: "minioadmin"
      awsSecretAccessKey: "minioadmin"
      awsEndpointUrl: "minio:9091"

    # AWS Sandbox Environment with environment credentials
    # aws-sandbox:
    #   type: "s3"
    #   awsRegion: "us-west-2"
    #   useEnvAws: true

    # AWS Production Environment with IAM role authentication
    # aws-prod:
    #   type: "s3"
    #   awsRegion: "us-east-1"
    #   useIam: true

    # AWS Development Environment with static credentials
    # aws-dev:
    #   type: "s3"
    #   awsRegion: "eu-west-1"
    #   awsAccessKeyId: "AKIA..."
    #   awsSecretAccessKey: "SECRET..."

  # Default provider - change to your preferred provider
  defaultProvider: "minio-local"

