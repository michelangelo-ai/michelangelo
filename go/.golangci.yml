# golangci-lint configuration for Go code quality
# Documentation: https://golangci-lint.run/usage/configuration/

run:
  timeout: 5m
  tests: true
  skip-dirs:
    - gen
    - thirdparty

linters:
  enable:
    - godox  # Detects TODO/FIXME/BUG comments and enforces format

linters-settings:
  godox:
    # Enforce that all TODO comments must reference a GitHub issue
    # Valid formats:
    #   - TODO(#123): description
    #   - TODO(https://github.com/org/repo/issues/123): description
    keywords:
      - TODO
      - FIXME
      - BUG
      - HACK
      - NOTE
    # Enable to fail on any TODO without issue reference
    # We'll start with reporting only, can enable strict mode later
    # For now, we want to detect unlinked TODOs

issues:
  # Exclude autogenerated files
  exclude-rules:
    - path: gen/.*\.go
      linters:
        - godox
    - path: thirdparty/.*\.go
      linters:
        - godox
  # Don't hide multiple issues on the same line
  max-issues-per-linter: 0
  max-same-issues: 0

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
