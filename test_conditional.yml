# Conditional (If-Else) Pattern Example
metadata:
  name: "conditional_example"
  description: "Demonstrates conditional execution"
  version: "1.0"

tasks:
  # Task that produces data for condition evaluation
  create_test_data:
    function: "example_tasks.merge_all"
    description: "Create test data for quality check"
    inputs:
      dataset_list: '[{"total_samples": 5000, "total_features": 100}]'
    config:
      type: "RayTask"

  check_data_quality:
    function: "example_tasks.check_quality"
    description: "Check data quality to decide next step"
    inputs:
      merged_data: "+create_test_data"
    config:
      type: "RayTask"
    dependencies: ["create_test_data"]

  # Conditional branching based on quality score
  quality_gate:
    function: "example_tasks.check_quality"
    description: "Quality gate for decision making"
    inputs:
      merged_data: "+check_data_quality"
    condition:
      field: "quality_score"
      operator: ">"
      value: 0.8
      on_true: "train_model"
      on_false: "clean_data"
    config:
      type: "RayTask"
    dependencies: ["check_data_quality"]

  # Executed if quality is good (condition = true)
  train_model:
    function: "example_tasks.train_model"
    description: "Train model with high quality data"
    inputs:
      training_data: "+check_data_quality"
      model_type: "bert"
    config:
      type: "RayTask"
      resources:
        cpu: 4
        memory: "8GB"
    when: "quality_gate.condition_result == true"

  # Executed if quality is poor (condition = false)
  clean_data:
    function: "example_tasks.advanced_cleanup"
    description: "Clean poor quality data"
    inputs:
      raw_data: "+check_data_quality"
    config:
      type: "RayTask"
      resources:
        cpu: 2
        memory: "4GB"
    when: "quality_gate.condition_result == false"