apiVersion: michelangelo.api/v2
kind: RayCluster
metadata:
  name: ray-cluster-v2
  namespace: default
spec:
  rayVersion: "2.2.0"
  head:
    serviceType: "ClusterIP"
    pod:
      name: head
      resource:
        cpu: 1
        memory: "2Gi"
      image: rayproject/ray:2.3.1-py310-cpu
      env:
        - name: RAY_HEAD_ENV
          value: "true"
        - name: DEBUG
          value: "false"
      hdfsDelegationToken: ""
      onInit: "/bin/bash -c echo 'Initializing Ray Head'"
      command:
        - "ray"
        - "start"
        - "--head"
        - "--dashboard-host=0.0.0.0"
        - "--num-cpus=2"
        - "--num-gpus=0"
    rayStartParams:
      dashboard-host: "0.0.0.0"
      block: "true"
  workers:
    - minInstances: 1
      maxInstances: 1
      pod:
        name: worker
        resource:
          cpu: 1
          memory: "1Gi"
        image: rayproject/ray:2.3.1-py310-cpu
        env:
          - name: RAY_WORKER_ENV
            value: "true"
          - name: DEBUG
            value: "false"
        hdfsDelegationToken: ""
        onInit: "/bin/bash -c echo 'Initializing Ray Worker'"
        command:
          - "ray"
          - "start"
      rayStartParams:
        block: "true"
