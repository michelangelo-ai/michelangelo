apiVersion: michelangelo.api/v2
kind: RayCluster
metadata:
  name: ray-cluster-v2
  namespace: default
spec:
  rayVersion: "2.2.0"
  head:
    serviceType: "ClusterIP"
    pod:
      name: rayHeadPod
      resource:
        cpu: 1
        memory: "2Gi"
      image: rayproject/ray:2.2.0
      env:
        - name: RAY_HEAD_ENV
          value: "true"
        - name: DEBUG
          value: "false"
      hdfsDelegationToken: ""
      onInit: "/bin/bash -c echo 'Initializing Ray Head'"
      command:
        - "ray"
        - "start"
        - "--head"
        - "--dashboard-host=0.0.0.0"
        - "--num-cpus=2"
        - "--num-gpus=0"
  workers:
    - minInstances: 2
      maxInstances: 5
      pod:
        name: rayWorkerPod
        resource:
          cpu: 2
          memory: "4Gi"
        image: rayproject/ray:2.2.0
        env:
          - name: RAY_WORKER_ENV
            value: "true"
          - name: DEBUG
            value: "false"
        hdfsDelegationToken: ""
        onInit: "/bin/bash -c echo 'Initializing Ray Worker'"
        command:
          - "ray"
          - "start"
          - "--address=ray://ray-head-service:6379"
          - "--num-cpus=4"
          - "--num-gpus=0"
