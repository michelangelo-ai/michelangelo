apiVersion: michelangelo.api/v2
kind: RayJob
metadata:
  name: ray-job-v2
  namespace: default
spec:
  # Reference to the existing RayCluster
  cluster:
    name: ray-cluster-v2
    namespace: default  # Adjust if the cluster is in a different namespace

  # Entry point for the RayJob
  entrypoint: "python -c \"import ray; ray.init(); print(ray.cluster_resources())\""
