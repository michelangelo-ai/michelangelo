apiVersion: v1
kind: Pod
metadata:
  name: controllermgr
  labels:
    app: controllermgr
spec:
  containers:
    - name: app
      image: bazel/go/cmd/controllermgr:image
      imagePullPolicy: Never
      env:
        - name: CONFIG_DIR
          value: go/cmd/controllermgr/config
        - name: CADENCE_HOST
          value: cadence:7833
        - name: METRICS_ADDRESS
          value: :8090
        - name: HEALTH_ADDRESS
          value: :8091
---
apiVersion: v1
kind: Service
metadata:
  name: controllermgr
  labels:
    app: controllermgr
spec:
  type: NodePort
  selector:
    app: controllermgr
  ports:
    - name: metrics
      port: 8090
      nodePort: 30005
    - name: health
      port: 8091
      nodePort: 30006
