---
# Kubernetes Job to Initialize Ingester Database Schema
# Uses: scripts/ingester_schema.sql (the canonical schema file)
# Creates: 39 tables for all 13 CRDs watched by the ingester
---
apiVersion: batch/v1
kind: Job
metadata:
  name: ingester-schema-init
  namespace: default
  labels:
    app: michelangelo-ingester
  annotations:
    description: "Initializes MySQL schema for Michelangelo ingester - all 13 CRDs"
    # Ensure this runs after MySQL is deployed
    # If using Helm, add: "helm.sh/hook": post-install,post-upgrade
    # If using Argo CD, add dependencies in Application manifest
spec:
  ttlSecondsAfterFinished: 86400  # Auto-delete after 24 hours
  backoffLimit: 3                  # Retry up to 3 times if MySQL is temporarily unavailable
  
  template:
    metadata:
      labels:
        app: michelangelo-ingester
    spec:
      restartPolicy: OnFailure
      
      # Wait for MySQL to be ready
      initContainers:
        - name: wait-for-mysql
          image: mysql:8
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              echo "Waiting for MySQL pod to be ready..."
              echo "Checking service endpoint availability..."
              
              MAX_ATTEMPTS=60  # Wait up to 2 minutes
              ATTEMPT=0
              
              while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
                ATTEMPT=$((ATTEMPT + 1))
                
                # Check if MySQL service has endpoints (pod is running)
                if nslookup mysql >/dev/null 2>&1; then
                  echo "  ✓ DNS resolution working"
                  
                  # Check if MySQL is accepting connections
                  if mysql -h mysql -u root -proot -e "SELECT 1" 2>/dev/null; then
                    echo "  ✓ MySQL is ready and accepting connections!"
                    
                    # Verify database can be accessed
                    if mysql -h mysql -u root -proot -e "SHOW DATABASES;" 2>/dev/null | grep -q mysql; then
                      echo "  ✓ MySQL is fully operational!"
                      exit 0
                    fi
                  fi
                fi
                
                echo "  Attempt $ATTEMPT/$MAX_ATTEMPTS: MySQL not ready, waiting..."
                sleep 2
              done
              
              echo "✗ MySQL did not become ready after $MAX_ATTEMPTS attempts"
              exit 1
      
      # Execute the schema SQL
      containers:
        - name: init-schema
          image: mysql:8
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              echo "==========================================="
              echo "Ingester Schema Initialization"
              echo "==========================================="
              echo "Creating tables for 13 CRDs (39 total tables)"
              echo ""
              
              if mysql -h mysql -u root -proot < /schema/ingester_schema.sql; then
                echo "✓ Schema created successfully!"
                echo ""
                mysql -h mysql -u root -proot michelangelo -e "
                  SELECT COUNT(*) as total_tables 
                  FROM information_schema.tables 
                  WHERE table_schema='michelangelo';
                "
                echo ""
                echo "Tables:"
                mysql -h mysql -u root -proot michelangelo -e "SHOW TABLES;" | sed 's/^/  /'
                exit 0
              else
                echo "✗ Schema initialization failed!"
                exit 1
              fi
          volumeMounts:
            - name: schema
              mountPath: /schema
              readOnly: true
      
      volumes:
        - name: schema
          configMap:
            name: ingester-schema-sql

---
# To use this Job:
# 1. Create ConfigMap from the SQL file:
#    kubectl create configmap ingester-schema-sql \
#      --from-file=ingester_schema.sql=scripts/ingester_schema.sql
#
# 2. Apply this Job:
#    kubectl apply -f scripts/ingester_schema_job.yaml
#
# 3. Check status:
#    kubectl get job ingester-schema-init
#    kubectl logs job/ingester-schema-init
#
# 4. Verify:
#    kubectl exec mysql -- mysql -u root -proot michelangelo -e "SHOW TABLES;"
#    Expected: 39 tables

# ==============================================================================
# HEALTH CHECK & ORDERING
# ==============================================================================
# 
# Q: Does this Job ensure MySQL is healthy before running?
# A: YES! The init container (wait-for-mysql) ensures:
#    ✅ MySQL pod is running
#    ✅ MySQL service DNS resolves
#    ✅ MySQL accepts connections
#    ✅ MySQL responds to queries
#
# The Job will NOT execute the schema SQL until all these checks pass.
#
# Deployment Order Best Practices:
# 1. Deploy MySQL: kubectl apply -f mysql.yaml
# 2. Wait for ready: kubectl wait --for=condition=ready pod/mysql --timeout=5m  
# 3. Create ConfigMap: kubectl create configmap ingester-schema-sql --from-file=...
# 4. Run this Job: kubectl apply -f scripts/ingester_schema_job.yaml
#
# The init container provides up to 2 minutes of retry logic if MySQL is slow to start.
# ==============================================================================
