apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: michelangelo-prod

namePrefix: prod-

resources:
  - ../../base

patchesStrategicMerge:
  - apiserver-patch.yaml
  - controllermgr-patch.yaml
  - worker-patch.yaml
  - ui-patch.yaml

configMapGenerator:
  - name: michelangelo-apiserver-config
    behavior: merge
    files:
      - config-prod.yaml=apiserver-config-prod.yaml
  - name: michelangelo-worker-config
    behavior: merge
    files:
      - config-prod.yaml=worker-config-prod.yaml

secretGenerator:
  - name: michelangelo-database
    env: database.env
  - name: michelangelo-storage
    env: storage.env
  - name: michelangelo-temporal
    env: temporal.env

images:
  - name: ghcr.io/michelangelo-ai/apiserver
    newTag: v1.0.0  # Use specific version tags in production
  - name: ghcr.io/michelangelo-ai/controller-manager
    newTag: v1.0.0
  - name: ghcr.io/michelangelo-ai/worker
    newTag: v1.0.0
  - name: ghcr.io/michelangelo-ai/ui
    newTag: v1.0.0

commonLabels:
  environment: production
  version: v1.0.0

commonAnnotations:
  deployment.kubernetes.io/revision: "1"
  config.kubernetes.io/origin: |
    configuredIn: deploy/production/environments/prod/kustomization.yaml
    configuredBy:
      apiVersion: builtin
      kind: KustomizePlugin

replicas:
  - name: michelangelo-apiserver
    count: 3
  - name: michelangelo-controller-manager
    count: 2
  - name: michelangelo-worker
    count: 5