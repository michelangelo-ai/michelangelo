apiVersion: v1
kind: ConfigMap
metadata:
  name: michelangelo-apiserver-config
data:
  base.yaml: |
    apiserver:
      yarpc:
        host: 0.0.0.0
        port: 14566
      k8s:
        qps: 300
        burst: 600
      metadataStorage:
        enableMetadataStorage: false
      crdSync:
        enableCRDUpdate: true