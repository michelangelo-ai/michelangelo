apiVersion: v1
kind: ServiceAccount
metadata:
  name: michelangelo-apiserver
  labels:
    app: michelangelo-apiserver
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: michelangelo-apiserver
  labels:
    app: michelangelo-apiserver
rules:
- apiGroups: ["apiextensions.k8s.io"]
  resources: ["customresourcedefinitions"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["michelangelo.api"]
  resources: ["*"]
  verbs: ["*"]
- apiGroups: [""]
  resources: ["*"]
  verbs: ["*"]
- apiGroups: ["apps"]
  resources: ["*"]
  verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: michelangelo-apiserver
  labels:
    app: michelangelo-apiserver
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: michelangelo-apiserver
subjects:
- kind: ServiceAccount
  name: michelangelo-apiserver