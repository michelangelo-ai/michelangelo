apiVersion: v1
kind: Service
metadata:
  name: michelangelo-apiserver
  namespace: default
  labels:
    app.kubernetes.io/name: michelangelo-apiserver
    app.kubernetes.io/component: apiserver
    app.kubernetes.io/part-of: michelangelo-platform
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
  - name: grpc
    port: 14566
    targetPort: grpc
    protocol: TCP
  - name: metrics
    port: 8080
    targetPort: metrics
    protocol: TCP
  - name: health
    port: 8081
    targetPort: health
    protocol: TCP
  selector:
    app.kubernetes.io/name: michelangelo-apiserver
    app.kubernetes.io/component: apiserver