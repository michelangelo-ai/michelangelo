{{- if .Values.components.worker.enabled -}}
# Worker configuration for Cadence/Temporal workflows
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "michelangelo.fullname" . }}-worker-config
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "michelangelo.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
data:
  base.yaml: |
    # YARPC worker config
    worker:
      maApiServiceName: ma-apiserver
      address: michelangelo-apiserver:14566
      useTLS: false
    # Cadence/Temporal workflow engine config
    workflow-engine:
      host: {{ include "michelangelo.workflowEndpoint" . }}
      transport: grpc
      provider: {{ .Values.workflow.engine | default "cadence" }}
      workers:
        - domain: {{ .Values.cadence.domain | default "default" }}
          taskList: default
      client:
        domain: {{ .Values.cadence.domain | default "default" }}
    # Storage config
    minio:
      awsRegion: {{ .Values.storage.s3.region }}
{{- if eq .Values.cloud "local" }}
      awsAccessKeyId: {{ .Values.storage.s3.accessKeyId }}
      awsSecretAccessKey: {{ .Values.storage.s3.secretAccessKey }}
      awsEndpointUrl: {{ .Values.storage.s3.endpoint }}
{{- else }}
      awsEndpointUrl: {{ include "michelangelo.storageEndpoint" . }}
{{- end }}
{{- end }}

