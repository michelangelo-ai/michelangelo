{{- if .Values.components.worker.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "michelangelo.fullname" . }}-worker
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "michelangelo.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  {{- if not .Values.worker.autoscaling.enabled }}
  replicas: {{ .Values.worker.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "michelangelo.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "michelangelo.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      serviceAccountName: {{ include "michelangelo.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: worker
        image: {{ include "michelangelo.image" (dict "registry" .Values.image.registry "repository" .Values.worker.image.repository "tag" (.Values.worker.image.tag | default .Values.image.tag) "Chart" .Chart) }}
        imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
        envFrom:
        - configMapRef:
            name: michelangelo-config
        env:
        - name: CADENCE_CLI_ADDRESS
          value: {{ include "michelangelo.workflowEndpoint" . }}
        resources:
          {{- toYaml .Values.worker.resources | nindent 10 }}
        {{- with .Values.securityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.gpuTolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

