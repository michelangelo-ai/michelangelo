{{- if .Values.components.apiserver.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "michelangelo.fullname" . }}-apiserver
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "michelangelo.labels" . | nindent 4 }}
    app.kubernetes.io/component: apiserver
spec:
  {{- if not .Values.apiserver.autoscaling.enabled }}
  replicas: {{ .Values.apiserver.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "michelangelo.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: apiserver
  template:
    metadata:
      labels:
        {{- include "michelangelo.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: apiserver
    spec:
      serviceAccountName: {{ include "michelangelo.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: apiserver
        image: {{ include "michelangelo.image" (dict "registry" .Values.image.registry "repository" .Values.apiserver.image.repository "tag" (.Values.apiserver.image.tag | default .Values.image.tag) "Chart" .Chart) }}
        imagePullPolicy: {{ .Values.apiserver.image.pullPolicy }}
        ports:
        - name: grpc
          containerPort: 14566
          protocol: TCP
        # TODO: add liveness and readiness probes
        envFrom:
        - configMapRef:
            name: michelangelo-config
        resources:
          {{- toYaml .Values.apiserver.resources | nindent 10 }}
        {{- with .Values.securityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.gpuTolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

