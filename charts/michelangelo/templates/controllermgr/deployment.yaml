{{- if .Values.components.controllermgr.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "michelangelo.fullname" . }}-controllermgr
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "michelangelo.labels" . | nindent 4 }}
    app.kubernetes.io/component: controllermgr
spec:
  replicas: {{ .Values.controllermgr.replicaCount }}
  selector:
    matchLabels:
      {{- include "michelangelo.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: controllermgr
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/controllermgr/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "michelangelo.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: controllermgr
    spec:
      serviceAccountName: {{ include "michelangelo.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: controllermgr
        image: {{ include "michelangelo.image" (dict "registry" .Values.image.registry "repository" .Values.controllermgr.image.repository "tag" (.Values.controllermgr.image.tag | default .Values.image.tag) "Chart" .Chart) }}
        imagePullPolicy: {{ .Values.controllermgr.image.pullPolicy }}
        ports:
        - name: metrics
          containerPort: 8091
          protocol: TCP
        - name: health
          containerPort: 8081
          protocol: TCP
          # TODO: add liveness and readiness probes
        volumeMounts:
        - name: config-volume
          mountPath: /config
        envFrom:
        - configMapRef:
            name: michelangelo-config
        resources:
          {{- toYaml .Values.controllermgr.resources | nindent 10 }}
        {{- with .Values.securityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      volumes:
      - name: config-volume
        configMap:
          name: {{ include "michelangelo.fullname" . }}-controllermgr-config
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.gpuTolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

