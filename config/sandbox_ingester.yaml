# Michelangelo Sandbox Configuration with Ingester
# This file demonstrates how to configure the ingester controller with MySQL and MinIO

# MySQL Configuration
mysql:
  enabled: true
  host: "localhost"
  port: 3306
  user: "root"
  password: ""  # Set via environment variable MYSQL_PASSWORD for security
  database: "michelangelo"
  maxOpenConns: 25
  maxIdleConns: 5
  connMaxLifetime: "5m"

# MinIO Configuration (S3-compatible object storage)
minio:
  enabled: true
  endpoint: "localhost:9000"
  accessKeyID: "minioadmin"  # Default MinIO credentials
  secretAccessKey: "minioadmin"
  useSSL: false
  bucketName: "michelangelo-blobs"

# Ingester Controller Configuration
ingester:
  concurrentReconciles: 2  # Number of concurrent reconciliations per CRD type
  requeuePeriod: "30s"     # Period for requeuing failed reconciliations

# Metadata Storage Configuration
metadataStorage:
  enableMetadataStorage: true
  deletionDelay: "10s"
  enableResourceVersionCache: false
