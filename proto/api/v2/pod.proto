// Pod API provides interfaces for managing Pod resources in Michelangelo.
// A Pod represents a unit of compute that can be scheduled and executed.
// The Pod definition includes:
// - Resource requirements like CPU, memory, GPU
// - Environment variables for configuration
// - Pod specifications for container settings
//
// Key concepts:
// - Pods request specific compute resources
// - Environment variables configure runtime behavior
// - Resource specs define hardware requirements
// - GPU SKUs can be specified for cloud workloads
// - File descriptor limits can be configured

syntax = "proto3";

package michelangelo.api.v2;

option go_package = "v2";

import "michelangelo/api/options.proto";
import "google/protobuf/any.proto";

// ResourceSpec defines compute resource requirements for a Pod.
// It specifies hardware limits and constraints for:
// - CPU cores and memory allocation
// - Disk storage capacity
// - GPU count and SKU type
// - File descriptor limits
// This enables consistent resource management across:
// - Projects and pipelines
// - Training and inference jobs
// - Batch and streaming workloads
// Default values are allowed and validated on input.
// TODO: Replace with K8s Quantity in ResourceRequirements
message ResourceSpec {
  // CPU limit in number of CPU cores. This field specifies:
  // - The maximum number of CPU cores allocated to the Pod
  // - Must be a non-negative integer (validated by min:0)
  // - Used for resource scheduling and limits
  // - Fractional cores can be specified (e.g. 0.5 cores)
  // For example: 2 means 2 full CPU cores, 0.5 means half a core
  int32 cpu = 1 [(michelangelo.api.validation) = {min: "0"}];

  // Memory limit in bytes. This field specifies:
  // - The maximum memory allocated to the Pod
  // - Must be a non-negative string value (e.g. "32G", "1024M")
  // - Used for resource scheduling and limits
  // - Supports units like G (gigabytes), M (megabytes), K (kilobytes)
  // For example: "32G" means 32 gigabytes, "1024M" means 1024 megabytes
  string memory = 2;

  // Disk size limit in bytes. This field specifies:
  // - The maximum disk storage allocated to the Pod
  // - Must be a non-negative string value (e.g. "100G", "1024M")
  // - Used for resource scheduling and limits
  // - Supports units like G (gigabytes), M (megabytes), K (kilobytes)
  // For example: "100G" means 100 gigabytes, "1024M" means 1024 megabytes
  string disk_size = 3;

  // GPU limit in number of GPUs. This field specifies:
  // - The maximum number of GPUs allocated to the Pod
  // - Must be a non-negative integer (validated by min:0)
  // - Used for resource scheduling and limits
  // - Required for GPU workloads like model training
  // For example: 2 means 2 GPUs, 0 means no GPUs required
  int32 gpu = 4 [(michelangelo.api.validation) = {min: "0"}];

  // File descriptor limit in number of open file descriptors. This field specifies:
  // - The maximum number of file descriptors allowed for the Pod
  // - Must be a non-negative integer (validated by min:0)
  // - Used to prevent "too many open files" errors
  // - Critical for workloads that open many files/sockets
  // For example: 1024 means the Pod can have up to 1024 open files/sockets
  int32 file_descriptors = 5 [(michelangelo.api.validation) = {min: "0"}];

  // File descriptor limit for the Pod. This field specifies:
  // - Maximum number of open file descriptors allowed
  // - Used to prevent resource exhaustion
  // - Default system limits apply if not specified
  // - Higher limits may be needed for:
  //   - Database connections
  //   - Network-intensive workloads
  //   - File processing jobs
  // For example: 65536 for high-throughput applications
  int32 fd_limit = 7;

  // Extension field for additional custom data
  google.protobuf.Any ext = 999;

  // GPU SKU identifier that specifies:
  // - The type/model of GPU required (e.g. "nvidia-tesla-v100")
  // - Required for cloud workloads to ensure correct GPU allocation
  // - Must match available SKUs in the cloud provider
  // - Used for resource scheduling and cost estimation
  // For example: "nvidia-tesla-v100" requests V100 GPUs specifically
  // Mandatory for cloud GPU
  string gpu_sku = 6;
}

// Environment represents an environment variable present in a Pod.
// It defines:
// - Name of the environment variable
// - Value assigned to the variable
// - Used to configure Pod runtime environment
// For example:
// - Setting PATH, LD_LIBRARY_PATH for dependencies
// - Configuring application parameters
// - Setting credentials and connection strings
message Environment {
  // Name of the environment variable. This field specifies:
  // - The unique identifier for this environment variable
  // - Must be a valid environment variable name
  // - Used to reference this variable in the Pod
  // - Case sensitive and should follow shell naming conventions
  // For example: "PATH", "LD_LIBRARY_PATH", "DB_CONNECTION_STRING"
  string name = 1;

  // Value of the environment variable. This field specifies:
  // - The value assigned to this environment variable
  // - Can contain strings, numbers, or references to other variables
  // - Used to configure the Pod's runtime environment
  // - Supports variable expansion and shell syntax
  // For example: "/usr/local/bin:$PATH", "postgres://localhost:5432", "DEBUG=true"
  string value = 2;
}

// PodSpec defines configuration for a Pod running in a distributed ML job:
// - Used by Spark and Horovod jobs for distributed training
// - Specifies resource requirements and environment
// - Configures container image and initialization
// - Sets security and access controls
// For example:
// - Spark executor pods with GPU resources
// - Horovod worker pods with custom training images
// - Parameter server pods with environment config
message PodSpec {
  // name of the Pod. This field specifies:
  // - A unique identifier for this Pod instance
  // - Used for logging and monitoring purposes
  // - Helps identify specific Pods in a distributed job
  // - If not provided, a system-generated name will be used
  // For example: "spark-executor-0", "horovod-worker-1", "parameter-server-0"
  string name = 1;

  // Resource requirements for the Pod. This field specifies:
  // - CPU, memory, and GPU resource requests and limits
  // - Used for Pod scheduling and resource allocation
  // - Ensures Pods get required compute capacity
  // - Helps optimize cluster resource utilization
  // For example:
  // - CPU: 4 cores for compute-intensive training
  // - Memory: 16GB for large model loading
  // - GPU: 2 V100 GPUs for deep learning
  ResourceSpec resource = 2;

  // Docker image name for the Pod container. This field specifies:
  // - The container image to use for this Pod
  // - Must be a valid docker image reference
  // - Can include registry, repository and tag/digest
  // - Used to determine the Pod's runtime environment
  // For example: "uber/michelangelo-training:v1.2.3", "nvidia/cuda:11.0-base"
  string image = 3;

  // Docker image pulling policy for the Pod container. This field specifies:
  // Value	          Description
  // --------------------------------
  // Always	          Always pulls the image from the registry every time the pod is started. Recommended for mutable tags like latest.
  // IfNotPresent	    Pulls the image only if it is not already present on the node. Recommended for versioned images (e.g., myapp:v1.2.3).
  // Never	          Never pulls the image; uses the local image only. Fails if the image isn’t already available on the node.
  string imagePullingPolicy = 8;

  // Environment variables for the Pod container. This field specifies:
  // - Key-value pairs that configure the container environment
  // - Used to pass configuration to applications
  // - Can reference secrets and config maps
  // - Supports variable expansion and shell syntax
  // For example:
  // - Database connection strings
  // - API keys and credentials
  // - Feature flags and debug settings
  // - Path and library configurations
  repeated Environment env = 4;

  // List of sources to populate environment variables in the container.
  // The keys defined within a source must be a C_IDENTIFIER. All invalid keys
  // will be reported as an event when the container is starting. When a key exists in multiple
  // sources, the value associated with the last source will take precedence.
  // Values defined by an Env with a duplicate key will take precedence.
  // Cannot be updated.
  repeated EnvFromSource envFrom =9;

  // Security token used to authenticate and authorize access to secure HDFS.
  // This field specifies:
  // - Token for reading and writing HDFS data
  // - Used for secure data access in distributed jobs
  // - Temporary credential with expiration
  // - Should be rotated periodically
  // TODO: Replace with K8s Secrets for improved security
  string hdfs_delegation_token = 5;

  // Custom module to run during Pod initialization. This field specifies:
  // - Code or script to execute when Pod starts up
  // - Used for environment setup and configuration
  // - Can perform initialization tasks like:
  //   - Installing dependencies
  //   - Setting up storage mounts
  //   - Configuring network settings
  //   - Validating prerequisites
  // - Must complete successfully before main container starts
  string on_init = 6;

  // Command to execute in the Pod container. This field specifies:
  // - The command and arguments to run in the container
  // - Overrides the default ENTRYPOINT if provided
  // - Used to customize container behavior
  // - Can reference environment variables
  // For example:
  // - Custom training scripts: ["python", "train.py", "--epochs=100"]
  // - Model serving commands: ["tritonserver", "--model-repository=/models"]
  // - Data processing jobs: ["spark-submit", "process.py", "--input=/data"]
  repeated string command = 7;

  // Extension field for additional custom data
  google.protobuf.Any ext = 999;
}
// EnvFromSource represents the source of a set of ConfigMaps or Secrets
message EnvFromSource {
  // text to prepend to the name of each environment variable. Must be a C_IDENTIFIER.
  string prefix = 1;

  // The ConfigMap to select from
  ConfigMapEnvSource configMapRef = 2;

  // The Secret to select from
  SecretEnvSource secretRef = 3;
}

// ConfigMapEnvSource selects a ConfigMap to populate the environment
// variables with.
//
// The contents of the target ConfigMap's Data field will represent the
// key-value pairs as environment variables.
message ConfigMapEnvSource {
  // The ConfigMap to select from.
  LocalObjectReference localObjectReference = 1;

  // Specify whether the ConfigMap must be defined
  bool optional = 2;
}


// SecretEnvSource selects a Secret to populate the environment
// variables with.
//
// The contents of the target Secret's Data field will represent the
// key-value pairs as environment variables.
message SecretEnvSource {
  // The Secret to select from.
  LocalObjectReference localObjectReference = 1;

  // Specify whether the Secret must be defined
  bool optional = 2;
}

// LocalObjectReference contains enough information to let you locate the
// referenced object inside the same namespace.
// ---
// New uses of this type are discouraged because of difficulty describing its usage when embedded in APIs.
//  1. Invalid usage help.  It is impossible to add specific help for individual usage.  In most embedded usages, there are particular
//     restrictions like, "must refer only to types A and B" or "UID not honored" or "name must be restricted".
//     Those cannot be well described when embedded.
//  2. Inconsistent validation.  Because the usages are different, the validation rules are different by usage, which makes it hard for users to predict what will happen.
//  3. We cannot easily change it.  Because this type is embedded in many locations, updates to this type
//     will affect numerous schemas.  Don't make new APIs embed an underspecified API type they do not control.
//
// Instead of using this type, create a locally provided and used type that is well-focused on your reference.
// For example, ServiceReferences for admission registration: https://github.com/kubernetes/api/blob/release-1.17/admissionregistration/v1/types.go#L533 .
message LocalObjectReference {
  // Name of the referent.
  // This field is effectively required, but due to backwards compatibility is
  // allowed to be empty. Instances of this type with an empty value here are
  // almost certainly wrong.
  // More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
  // TODO: Drop `kubebuilder:default` when controller-gen doesn't need it https://github.com/kubernetes-sigs/kubebuilder/issues/3896.
  string name = 1;
}
