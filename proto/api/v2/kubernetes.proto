// This file defines the Kubernetes related messages in Michelangelo API.

syntax = "proto3";

package michelangelo.api.v2;

option go_package = "v2";

// ConnectionSpec has the configuration
// used to connect to the kubernetes
// cluster. This is only applicable for
// cloud clusters. Configuration for on-prem
// clusters could be provided via a custom
// module.
message ConnectionSpec {
  // Host to connect to.
  string host = 1;

  // Port to make the connection to.
  string port = 2;

  // Bearer token secret will be provided
  // from the secrets provider. This is the tag
  // value in the configuration struct that
  // represents the secrets.
  string token_tag = 3;

  // CA data secret will be provided
  // from the secrets provider. This is the tag
  // value in the configuration struct that
  // represents the secrets.
  string ca_data_tag = 4;
}

// Sku config that is supported
// in the cluster. This is relevant
// only for the cloud case.
message SkuConfig {
  // CPU limit in number of CPU cores
  int32 cpu = 1;

  // Memory limit such as 32G
  string memory_gb = 2;

  // Disk size limit such as 100G
  string disk_size_gb = 3;

  // GPU limit in number of GPUs
  int32 gpu = 4;

  // GPU sku identifier. Mandatory for
  // cloud workloads
  string gpu_sku = 5;
}

// Kubernetes spec
message KubernetesSpec {
  // Rest config to connect
  // to the cluster
  ConnectionSpec rest = 1;

  // Skus that are supported in
  // the cluster. This is mandatory
  // for cloud clusters.
  repeated SkuConfig skus = 2;
}
