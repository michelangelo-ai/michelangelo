// This file defines the cached output generated by an ML application.
// The cached output is stored in blob storage.
syntax = "proto3";

package michelangelo.api.v2;

option go_package = "v2";

import "k8s.io/apimachinery/pkg/apis/meta/v1/generated.proto";
import "michelangelo/api/options.proto";
import "google/protobuf/struct.proto";

enum CachedOutputType {
  CACHED_OUTPUT_TYPE_INVALID = 0;
  CACHED_OUTPUT_TYPE_VARIABLE = 1;
  // TRANSFORM_CKPT is the checkpoint of data tranform step.
  CACHED_OUTPUT_TYPE_TRANSFORM_CKPT = 2;
  // TRAINING_CKPT is the checkpoint of trainer step.
  CACHED_OUTPUT_TYPE_TRAINING_CKPT = 3;
  // Cached output type for raw models.
  // Raw models are models saved before packing into neuropodjni model. They will be used for explainability.
  CACHED_OUTPUT_TYPE_RAW_MODEL = 4;
}

enum StorageType {
  STORAGE_TYPE_INVALID = 0;
  STORAGE_TYPE_HDFS = 1;
  STORAGE_TYPE_TERRA_BLOB = 2;
  STORAGE_TYPE_CFS = 3;
}

enum VariableType {
  VARIABLE_TYPE_INVALID = 0;
  VARIABLE_TYPE_CUSTOM = 1;
  VARIABLE_TYPE_PROTO = 2;
  VARIABLE_TYPE_SPARK_DATA_FRAME = 3;
  VARIABLE_TYPE_SPARK_ML_PIPELINE = 4;
  VARIABLE_TYPE_SPARK_ML_PIPELINE_MODEL = 5;
  VARIABLE_TYPE_PARAMS = 6;
}

// Describes the spec of the generated intermediate variable CACHED_OUTPUT_TYPE_VARIABLE.
message VariableSpec {
  // Unique identifier of a variable in a pipeline run.
  string id = 1;

  // Types of variable.
  VariableType type = 2;

  // metadata for UI display
  google.protobuf.Struct metadata = 3;
}

// Describes the generated checkpoints CACHED_OUTPUT_TYPE_TRANSFORM_CKPT / CACHED_OUTPUT_TYPE_TRAINING_CKPT
message CheckpointSpec {
  // Unique identifier of a ckpt in a pipeline run.
  string id = 1;
  // metadata for UI display
  google.protobuf.Struct metadata = 2;
}

// Describes the spec for raw model
message RawModelSpec {
  // Unique identifider for raw model
  string id = 1;
}

// Describes the state of a cached output.
message CachedOutputStatus {
}

// Defines the spec of a cached output.
message CachedOutputSpec {
  // Types of cached output, such as variable, incremental training checkpoint, etc.
  CachedOutputType type = 1;

  // Where the cached output stores, such as S3, HDFS, Terrablob, GCS, etc.
  StorageType storage_type = 2;

  // Unique resource identifier to locate the resource in the storage.
  string storage_uri = 3;

  // Zone of the cluster that the cached output is published, e.g. PHX4 or DCA1.
  string zone = 9;

  // Number of days before this cached output expired and being cleaned up from the underlying storage.
  int32 ttl_in_days = 4;

  // The pipeline run that creates this cached output.
  michelangelo.api.ResourceIdentifier source_pipeline_run = 5 [
    (michelangelo.api.resource_reference) = {
      type: "michelangelo.uber.com/PipelineRun"
    }
  ];

  // The pipeline run step that generates this cached output.
  string source_pipeline_run_step = 6;

  // Metadata that describes the cached output.
  oneof metadata {
    option (michelangelo.api.required) = true;

    VariableSpec variable_spec = 7;

    CheckpointSpec checkpoint_spec = 8;

    RawModelSpec raw_model_spec = 10;
  }
}

// Represents cached output generated by an ML application.
message CachedOutput {
  option (michelangelo.api.resource) = {
    immutable: true,
  };

  k8s.io.apimachinery.pkg.apis.meta.v1.TypeMeta type_meta = 1;
  k8s.io.apimachinery.pkg.apis.meta.v1.ObjectMeta metadata = 2;

  // Spec of the desired behavior of the CachedOutput.
  CachedOutputSpec spec = 3;

  // Most recently observed status of the CachedOutput.
  CachedOutputStatus status = 4;
}

// A list of CachedOutput.
message CachedOutputList {
  option (michelangelo.api.resource_list) = {};

  k8s.io.apimachinery.pkg.apis.meta.v1.TypeMeta type_meta = 1;
  k8s.io.apimachinery.pkg.apis.meta.v1.ListMeta metadata = 2;

  // A list of CachedOutput
  repeated CachedOutput items = 3;
}
