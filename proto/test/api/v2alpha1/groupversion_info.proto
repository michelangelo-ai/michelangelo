// GroupVersion Info API defines version and group information for the Michelangelo API.
// This file contains package metadata and options for:
// - API group name (michelangelo.api)
// - API version (v2alpha1)
// - Go package configuration
// - Group info options
//
// Key concepts:
// - API groups organize related APIs together
// - Versions allow API evolution while maintaining compatibility
// - Go package options configure code generation
// - Group info tracks API metadata

syntax = "proto3";

package michelangelo.api.v2alpha1;

import "michelangelo/api/options.proto";
import "michelangelo/api/v2/groupversion_info.proto";

option go_package = "v2alpha1";

option (michelangelo.api.group_info) = {
  name: "michelangelo.api";
  version: "v2alpha1";
  hub_version: "v2";  // v2 is the hub (storage version)
};
