# Comprehensive Input Parameters Example
metadata:
  name: "input_parameters_example"
  description: "Demonstrates various input parameter patterns"
  version: "1.0"

tasks:
  # Task 1: Discovery with custom parameters
  discover_data:
    function: "example_tasks.discover_datasets"
    description: "Discover datasets with custom configuration"
    inputs:
      num_datasets: 8
      dataset_prefix: "training_data"
    config:
      type: "RayTask"

  # Task 2: Preprocessing with different parameters for each dataset
  preprocess_datasets:
    function: "example_tasks.preprocess"
    description: "Preprocess each dataset with custom settings"
    inputs:
      output_format: "csv"
      min_samples: 5000
      max_samples: 15000
    expand:
      dataset_id: "+discover_data"
    config:
      type: "RayTask"
      resources:
        cpu: 2
        memory: "4GB"
    dependencies: ["discover_data"]

  # Task 3: Merge all results
  merge_preprocessed:
    function: "example_tasks.merge_all"
    description: "Merge all preprocessed datasets"
    inputs:
      dataset_list: "+preprocess_datasets"
    config:
      type: "RayTask"
    dependencies: ["preprocess_datasets"]

  # Task 4: Quality check with custom thresholds
  quality_assessment:
    function: "example_tasks.check_quality"
    description: "Check data quality with custom thresholds"
    inputs:
      merged_data: "+merge_preprocessed"
      target_samples: 75000
      target_features: 120
      quality_threshold: 0.75
    config:
      type: "RayTask"
    dependencies: ["merge_preprocessed"]

  # Task 5: Training with comprehensive parameters
  train_model:
    function: "example_tasks.train_model"
    description: "Train model with specific hyperparameters"
    inputs:
      training_data: "+quality_assessment"
      model_type: "transformer"
      epochs: 25
      learning_rate: 0.0003
      batch_size: 128
    config:
      type: "RayTask"
      resources:
        cpu: 4
        memory: "8GB"
    dependencies: ["quality_assessment"]