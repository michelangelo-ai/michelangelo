# Foreach/Expand Pattern Example
metadata:
  name: "foreach_example"
  description: "Demonstrates foreach/expand pattern"
  version: "1.0"


tasks:
  # Task that generates a list with custom parameters
  generate_datasets:
    function: "example_tasks.discover_datasets"
    description: "Generate list of datasets to process"
    inputs:
      num_datasets: 6
      dataset_prefix: "ml_data"
    config:
      type: "RayTask"


  # Task that expands over the list (foreach pattern) with custom parameters
  process_each_dataset:
    function: "example_tasks.preprocess"
    description: "Process each dataset in parallel"
    inputs:
      output_format: "parquet"
      min_samples: 3000
      max_samples: 12000
    expand:
      dataset_id: "+generate_datasets"  # Expand over previous task output
    config:
      type: "RayTask"
      resources:
        cpu: 2
        memory: "2GB"
    dependencies: ["generate_datasets"]