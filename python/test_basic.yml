# Basic test workflow - single static task (DAG Factory Style)
metadata:
  name: "basic_test"
  description: "Simple single task workflow"
  version: "1.0"

tasks:
  # Single static task
  - task_id: "simple_task"
    function: "example_tasks.discover_datasets"
    description: "Discover available datasets"
    config:
      type: "RayTask"
      resources:
        cpu: 1
        memory: "1GB"