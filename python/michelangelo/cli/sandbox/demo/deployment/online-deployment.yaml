apiVersion: michelangelo.api/v2
kind: Deployment
metadata:
  name: sentiment-online-deployment
  namespace: ma-dev-test
  annotations:
    deployment.michelangelo/last-prediction-timestamp: "1745884800"
  labels:
    stage: production
spec:
  desiredRevision:
    name: sentiment-model-v1
