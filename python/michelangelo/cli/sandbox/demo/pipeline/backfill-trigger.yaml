apiVersion: michelangelo.api/v2
kind: TriggerRun
metadata:
  name: training-pipeline-backfill-trigger
  namespace: ma-dev-test
  annotations:
    description: "Test training pipeline execution via backfill trigger"
spec:
  pipeline:
    name: training-pipeline
    namespace: ma-dev-test
  trigger:
    cronSchedule:
      cron: "0 8 * * *"  # Run every day at 8am
    maxConcurrency: 3
  startTimestamp: 2025-10-01T00:00:00Z
  endTimestamp: 2025-10-08T00:00:00Z
