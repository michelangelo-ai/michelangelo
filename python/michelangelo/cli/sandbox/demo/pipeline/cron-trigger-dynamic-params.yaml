apiVersion: michelangelo.api/v2
kind: TriggerRun
metadata:
  name: training-pipeline-cron-trigger-with-dynamic-params
  namespace: ma-dev-test
  annotations:
    description: "Test training pipeline execution via cron trigger with dynamic params"
spec:
  pipeline:
    name: training-pipeline
    namespace: ma-dev-test
  trigger:
    cronSchedule:
      cron: "* * * * *"  # Run every minute for testing
    maxConcurrency: 1
    parametersMap:
      test1:
        taskConfigs:
          load_data:
            path: 'glue'
            name: 'sst2'
            tokenizer_max_length: 256
      test2:
        taskConfigs:
          load_data:
            path: 'glue'
            name: 'mrpc'
            tokenizer_max_length: 128