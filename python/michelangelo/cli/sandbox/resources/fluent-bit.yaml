apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: "fluent-bit"
  labels:
    k8s-app: "fluent-bit"
spec:
  selector:
    matchLabels:
      k8s-app: "fluent-bit"
  template:
    metadata:
      labels:
        k8s-app: "fluent-bit"
    spec:
      serviceAccountName: "fluent-bit"
      initContainers:
        - name: "fix-perms"
          image: "busybox"
          command: ["sh", "-c", "chown -R 1000:1000 /tmp/ray"]
          volumeMounts:
            - name: "ray"
              mountPath: "/tmp/ray"
      containers:
        - name: "fluent-bit"
          image: "fluent/fluent-bit:3.2.7"
          args: ["-c", "/fluent-bit/etc/fluent-bit.yaml"]
          env:
            - name: "AWS_ENDPOINT_URL"
              value: "http://minio:9091"
          volumeMounts:
            - name: "fluent-bit-config-volume"
              mountPath: "/fluent-bit/etc"
            - name: "aws-credentials-volume"
              mountPath: "/root/.aws"
            - name: "ray"
              mountPath: "/tmp/ray"
      volumes:
        - name: "fluent-bit-config-volume"
          configMap:
            name: "fluent-bit-config"
        - name: "aws-credentials-volume"
          secret:
            secretName: "aws-credentials"
        - name: "ray"
          hostPath:
            path: "/tmp/ray"
