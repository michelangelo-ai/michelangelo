apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: default
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush 1
        Log_Level info
        Daemon off

    [INPUT]
        Name tail
        Path /tmp/ray/session_latest/logs/*.log
        Tag raylogs
        Refresh_Interval 5
        Read_from_Head true

    [OUTPUT]
        Name              s3
        Match             *
        Bucket            fluentbit-logs
        Region            us-east-1
        Endpoint          http://host.docker.internal:9090
        storage_class     STANDARD
        s3_key_format     /logs/%Y/%m/%d/%H/%M/%S-$UUID.log        
        upload_timeout 2      
