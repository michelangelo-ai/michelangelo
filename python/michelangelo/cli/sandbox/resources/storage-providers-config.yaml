---
apiVersion: v1
kind: ConfigMap
metadata:
  name: storage-providers-config
data:
  config.yaml: |
    # Multi-tenant storage configuration for different companies/organizations
    # Each storage type directly contains an array of providers

    # MinIO/S3-compatible storage providers
    minio:
      - name: "aws-dev"
        awsRegion: "us-west-2"
        useEnvAws: true
        default: true

      - name: "aws-prod"
        awsRegion: "us-east-1"
        useIam: true

      - name: "aws-company1"
        awsRegion: "us-west-2"
        useEnvAws: true

      - name: "aws-company2"
        awsRegion: "us-east-1"
        useEnvAws: true

      - name: "minio-sandbox"
        awsRegion: "us-east-1"
        awsAccessKeyId: "minioadmin"
        awsSecretAccessKey: "minioadmin"
        awsEndpointUrl: "minio:9091"

    # Azure Blob Storage providers
    azure:
      - name: "azure-sharezone"
        azureStorageAccount: "sharedstorage"
        azureSASToken: "${AZURE_SHARED_SAS_TOKEN}"
        default: true

      - name: "azure-company1"
        azureStorageAccount: "company1storage"
        azureSASToken: "${AZURE_COMPANY1_SAS_TOKEN}"

      - name: "azure-company2"
        azureStorageAccount: "company2storage"
        azureSASToken: "${AZURE_COMPANY2_SAS_TOKEN}"