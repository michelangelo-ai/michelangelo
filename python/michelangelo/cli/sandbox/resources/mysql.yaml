apiVersion: v1
kind: Pod
metadata:
  name: mysql
  labels:
    app: mysql
spec:
  containers:
    - name: mysql
      image: mysql:8.0
      imagePullPolicy: IfNotPresent
      ports:
        - containerPort: 3306
          name: mysql
      env:
        - name: MYSQL_ROOT_PASSWORD
          value: root
        - name: MYSQL_DATABASE
          value: temporal
      # Note: Cadence auto-setup will create cadence/cadence_visibility databases
      # Ingester will create michelangelo database via mysql-ingester.yaml Job
      volumeMounts:
        - name: mysql-data
          mountPath: /var/lib/mysql
      readinessProbe:
        exec:
          command:
            - mysqladmin
            - ping
            - -h
            - localhost
            - -u
            - root
            - -proot
        initialDelaySeconds: 10
        periodSeconds: 10
        timeoutSeconds: 5
        successThreshold: 1
        failureThreshold: 50
      livenessProbe:
        exec:
          command:
            - mysqladmin
            - ping
            - -h
            - localhost
            - -u
            - root
            - -proot
        initialDelaySeconds: 30
        periodSeconds: 30
        timeoutSeconds: 5
        successThreshold: 1
        failureThreshold: 10
  volumes:
    - name: mysql-data
      hostPath:
        path: /shared/mysql-data
        type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  labels:
    app: mysql
spec:
  type: NodePort
  ports:
    - port: 3306
      targetPort: 3306
      nodePort: 30001
      name: mysql
  selector:
    app: mysql
