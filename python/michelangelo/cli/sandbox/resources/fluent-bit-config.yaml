apiVersion: "v1"
kind: "ConfigMap"
metadata:
  name: "fluent-bit-config"
data:
  fluent-bit.yaml: |
    service:
      flush: 1
      daemon: "off"
      log_level: "debug"

    parsers:
      - name: "cri"
        format: "regex"
        regex: "^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<message>.*)$"
        time_key: "time"
        time_format: "%Y-%m-%dT%H:%M:%S.%L%z"

    pipeline:
      inputs:
        - name: tail
          path: /var/log/containers/uf-rj-*.log
          parser: cri
          tag: ray.batch
          path_key: filepath
          refresh_interval: 5
          rotate_wait: 30
          skip_long_lines: On
          skip_empty_lines: On
          read_from_head: On
        - name: tail
          path: /var/log/containers/uniflow-sp-*.log
          parser: cri
          tag: spark.batch
          path_key: filepath
          refresh_interval: 5
          rotate_wait: 30
          skip_long_lines: On
          skip_empty_lines: On
          read_from_head: On
      filters:
        - name: rewrite_tag
          match: ray.batch
          rule: $filepath .*(uf-rj-[^_]+)_.* $1.log false
        - name: rewrite_tag
          match: spark.batch
          rule: $filepath .*(uniflow-sp-[^-]+)-driver.* $1.log false
      outputs:
        - name: s3
          match: "*.log"
          bucket: logs
          region: us-east-1
          endpoint: http://minio:9091
          use_put_object: On
          s3_key_format: /$TAG
          total_file_size: 50M
          upload_timeout: 5m
          store_dir: /tmp/fluent-bit-s3
          store_dir_limit_size: 100M
