---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow-tracking-server
  labels:
    app: mlflow-tracking-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow-tracking-server
  template:
    metadata:
      labels:
        app: mlflow-tracking-server
    spec:
      containers:
      - name: mlflow-tracking-server
        image: python:3.10-slim
        ports:
        - containerPort: 5000
        env:
        - name: MLFLOW_BACKEND_STORE_URI
          value: "mysql+pymysql://root:root@mysql:3306/mlflow"
        - name: MLFLOW_DEFAULT_ARTIFACT_ROOT
          value: "s3://mlflow"
        - name: AWS_ACCESS_KEY_ID
          value: "ma-minio"
        - name: AWS_SECRET_ACCESS_KEY
          value: "g0Sfr9hRcsfRXuBS"
        - name: MLFLOW_S3_ENDPOINT_URL
          value: "http://minio:9000"
        - name: MLFLOW_TRACKING_SERVER_HOST
          value: "0.0.0.0"
        - name: MLFLOW_DISABLE_SECURITY
          value: "true"
        - name: MLFLOW_ENABLE_SECURITY_MIDDLEWARE
          value: "false"
        - name: MLFLOW_SERVER_DISABLE_SECURITY_MIDDLEWARE
          value: "true"
        command:
        - /bin/bash
        - -c
        - |
          pip install mlflow==3.6.0 pymysql boto3 psutil cryptography
          # Wait for MySQL to be ready and create MLflow database
          python -c "
          import pymysql
          import time
          import sys

          max_attempts = 60
          for attempt in range(max_attempts):
              try:
                  print(f'Attempting to connect to MySQL (attempt {attempt + 1}/{max_attempts})')
                  conn = pymysql.connect(host='mysql', user='root', password='root', connect_timeout=5)
                  cursor = conn.cursor()
                  cursor.execute('CREATE DATABASE IF NOT EXISTS mlflow')
                  conn.commit()
                  conn.close()
                  print('MLflow database created successfully')
                  break
              except Exception as e:
                  print(f'Database connection failed: {e}')
                  if attempt < max_attempts - 1:
                      time.sleep(2)
                  else:
                      print('Failed to connect to MySQL after all attempts')
                      sys.exit(1)
          "
          # Start MLflow tracking server
          mlflow server --backend-store-uri mysql+pymysql://root:root@mysql:3306/mlflow --default-artifact-root s3://mlflow --host 0.0.0.0 --port 5000 --serve-artifacts
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 60
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow-tracking-server
  labels:
    app: mlflow-tracking-server
spec:
  selector:
    app: mlflow-tracking-server
  ports:
  - name: http
    port: 5000
    targetPort: 5000
    nodePort: 30013
  type: NodePort
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mlflow-proxy-config
data:
  nginx.conf: |
    events {
        worker_connections 1024;
    }
    http {
        upstream mlflow {
            server mlflow-tracking-server:5000;
        }
        server {
            listen 5001;
            location / {
                proxy_pass http://mlflow;
                proxy_set_header Host localhost:5000;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow-proxy
  labels:
    app: mlflow-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow-proxy
  template:
    metadata:
      labels:
        app: mlflow-proxy
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 5001
        volumeMounts:
        - name: config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
      volumes:
      - name: config
        configMap:
          name: mlflow-proxy-config
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow-proxy
  labels:
    app: mlflow-proxy
spec:
  selector:
    app: mlflow-proxy
  ports:
  - name: http
    port: 5001
    targetPort: 5001
  type: ClusterIP