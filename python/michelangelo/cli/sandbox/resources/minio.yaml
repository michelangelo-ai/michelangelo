apiVersion: v1
kind: Pod
metadata:
  labels:
    app: minio
  name: minio
spec:
  containers:
    - name: minio
      image: minio/minio:RELEASE.2025-05-24T17-08-30Z
      imagePullPolicy: IfNotPresent
      command:
        - /bin/bash
        - -c
      args:
        - minio server /data --console-address :9090 --address :9091
      env:
        - name: MINIO_ROOT_USER
          value: "ma-minio"
        - name: MINIO_ROOT_PASSWORD
          value: "g0Sfr9hRcsfRXuBS"
      volumeMounts:
        - mountPath: /data
          name: data-volume
  volumes:
    - name: data-volume
      hostPath:
        path: /shared/minio-data
        type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  labels:
    app: minio
spec:
  type: NodePort
  ports:
    - port: 9090
      nodePort: 30008
      name: "9090"
    - port: 9091
      nodePort: 30007
      name: "9091"
  selector:
    app: minio
