# envoy.yaml (mounted via ConfigMap)
# - Listens on port 8081
# - Accepts gRPC-Web requests from localhost (UI)
# - Forwards to michelangelo-apiserver (gRPC backend) on port 15566

apiVersion: v1
kind: Pod
metadata:
  name: envoy
  labels:
    app: envoy
spec:
  containers:
    - name: envoy
      image: envoyproxy/envoy:v1.29-latest
      args: ["-c", "/etc/envoy/envoy.yaml"]
      ports:
        - containerPort: 8081
      volumeMounts:
        - name: config
          mountPath: /etc/envoy
  volumes:
    - name: config
      configMap:
        name: envoy-config
---
apiVersion: v1
kind: Service
metadata:
  name: envoy
  labels:
    app: envoy
spec:
  type: NodePort
  selector:
    app: envoy
  ports:
    - name: "http"
      port: 8081
      targetPort: 8081
      nodePort: 30010
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: envoy-config
  labels:
    app: envoy
data:
  envoy.yaml: |
    static_resources:
      listeners:
        - name: michelangelo-ui-listener
          address:
            socket_address: { address: 0.0.0.0, port_value: 8081 }
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: ingress_http
                    codec_type: AUTO
                    route_config:
                      name: local_route
                      virtual_hosts:
                        - name: backend
                          domains: ["*"]
                          routes:
                            - match:
                                prefix: "/"
                              route:
                                cluster: michelangelo-apiserver
                                max_grpc_timeout: 0s
                          cors:
                            allow_origin_string_match:
                              - safe_regex:
                                  regex: "http://localhost:[0-9]+"
                            allow_methods: "GET, POST, OPTIONS"
                            allow_headers: "content-type,context-ttl-ms,grpc-timeout,rpc-caller,rpc-encoding,rpc-service,x-grpc-web,x-user-agent"
                            max_age: "1728000"
                            expose_headers: "grpc-status,grpc-message"
                    http_filters:
                      - name: envoy.filters.http.grpc_web
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.grpc_web.v3.GrpcWeb
                      - name: envoy.filters.http.cors
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.Cors
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
      clusters:
        - name: michelangelo-apiserver
          connect_timeout: 1s
          type: LOGICAL_DNS
          http2_protocol_options: {}
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: michelangelo-apiserver
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: michelangelo-apiserver
                          port_value: 15566
