---
apiVersion: v1
kind: Pod
metadata:
  name: michelangelo-controllermgr
  labels:
    app: michelangelo-controllermgr
spec:
  containers:
    - name: app
      image: ghcr.io/michelangelo-ai/controllermgr:sha-04e99b4
      imagePullPolicy: IfNotPresent
      volumeMounts:
        - name: config-volume
          mountPath: /config
  volumes:
    - name: config-volume
      configMap:
        name: michelangelo-controllermgr-config
---
apiVersion: v1
kind: Service
metadata:
  name: michelangelo-controllermgr
  labels:
    app: michelangelo-controllermgr
spec:
  selector:
    app: michelangelo-controllermgr
  ports:
  - name: metrics
    port: 8091
    targetPort: 8091
  - name: health
    port: 8081
    targetPort: 8081
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: michelangelo-controllermgr-config
  labels:
    app: michelangelo-controllermgr
data:
  base.yaml: |
    controllermgr:
      metricsBindAddress: ${METRICS_ADDRESS::8091}
      healthProbeBindAddress: ${HEALTH_ADDRESS::8081}
      leaderElection: false
      leaderElectionID: decaf1259.michelangelo.uber.com

    controllers:
      rayCluster:
        k8sQps: 300
        k8sBurst: 600

    minio:
      awsRegion: us-east-1
      awsAccessKeyId: minioadmin
      awsSecretAccessKey: minioadmin
      awsEndpointUrl: minio:9091

    # Reuse the Cadence MySQL service for ingester metadata storage in sandbox.
    metadataStorage:
      enableMetadataStorage: true
      deletionDelay: 10s
      enableResourceVersionCache: false

    mysql:
      host: mysql
      port: 3306
      user: root
      password: root
      database: michelangelo

    ingester:
      concurrentReconciles: 2
      requeuePeriod: 30s

    workflowClient:
      service: cadence-frontend
      host: cadence:7833
      transport: grpc
      domain: default
      taskList: default
      executionUrlFormat: http://localhost:8088/namespaces/{{.Domain}}/workflows/{{.ExecutionID}}
