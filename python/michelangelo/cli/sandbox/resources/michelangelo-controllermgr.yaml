---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: michelangelo-controllermgr
  labels:
    app: michelangelo-controllermgr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: michelangelo-controllermgr
  template:
    metadata:
      labels:
        app: michelangelo-controllermgr
    spec:
      containers:
        - name: app
          image: 095116963143.dkr.ecr.ap-southeast-1.amazonaws.com/michelangelo-ai/controllermgr:main
          volumeMounts:
            - name: config-volume
              mountPath: /config
      volumes:
        - name: config-volume
          configMap:
            name: michelangelo-controllermgr-config
      nodeSelector:
        node.kubernetes.io/scaling-group: nodes
---
apiVersion: v1
kind: Service
metadata:
  name: michelangelo-controllermgr
  labels:
    app: michelangelo-controllermgr
spec:
  selector:
    app: michelangelo-controllermgr
  ports:
  - name: metrics
    port: 8091
    targetPort: 8091
  - name: health
    port: 8081
    targetPort: 8081
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: michelangelo-controllermgr-config
  labels:
    app: michelangelo-controllermgr
data:
  base.yaml: |
    controllermgr:
      metricsBindAddress: ${METRICS_ADDRESS::8091}
      healthProbeBindAddress: ${HEALTH_ADDRESS::8081}
      leaderElection: false
      leaderElectionID: decaf1259.michelangelo.uber.com
      port: 9443

    controllers:
      rayCluster:
        k8sQps: 300
        k8sBurst: 600

    minio:
      awsRegion: ap-southeast-1
      awsEndpointUrl: wenbo-ray-test
    
    workflowClient:
      service: cadence-frontend
      host: cadence:7833
      transport: grpc
      domain: default
