        `proto`       MEDIUMBLOB,
        `json`        JSON,
        `pipeline_namespace`    VARCHAR(255),
        `pipeline_name`    VARCHAR(255),
        `revision_namespace`    VARCHAR(255),
        `revision_name`    VARCHAR(255),
        `state`    VARCHAR(255),
        `auto_flip`    BOOLEAN,
        PRIMARY KEY   (`uid`),
        KEY    `trigger_run_namespace_name` (`namespace`, `name`),
        KEY    `trigger_run_create_time` (`create_time`),
        KEY    `trigger_run_update_time` (`update_time`),
        KEY    `trigger_run_delete_time` (`delete_time`),
        KEY    `trigger_run_namespace_timestamp` (`namespace`, `delete_time`, `create_time`, `update_time`),
        KEY    `trigger_run_pipeline` (`pipeline_namespace`, `pipeline_name`),
        KEY    `trigger_run_revision` (`revision_namespace`, `revision_name`),
        KEY    `trigger_run_state` (`state`),
        KEY    `trigger_run_auto_flip` (`auto_flip`)
    );

    CREATE TABLE IF NOT EXISTS `trigger_run_labels`
    (
        `id`      BIGINT       NOT NULL AUTO_INCREMENT,
        `obj_uid` VARCHAR(255) NOT NULL,
        `key`     VARCHAR(255) NOT NULL,
        `value`   VARCHAR(63),
        PRIMARY KEY (`id`),
        KEY    `trigger_run_labels_uid` (`obj_uid`),
        KEY    `trigger_run_labels_value` (`key`, `value`)
    );

    CREATE TABLE IF NOT EXISTS `trigger_run_annotations`
    (
        `id`      BIGINT       NOT NULL AUTO_INCREMENT,
        `obj_uid` VARCHAR(255) NOT NULL,
        `key`     VARCHAR(255) NOT NULL,
        `value`   TEXT,
        PRIMARY KEY (`id`),
        KEY    `trigger_run_annotations_uid` (`obj_uid`)
    );

---
apiVersion: batch/v1
kind: Job
metadata:
  name: mysql-ingester-schema-init
  namespace: default
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: schema-init
        image: mysql:8.0
        command:
        - /bin/sh
        - -c
        - |
          echo "Waiting for MySQL to be ready..."
          until mysql -h mysql -u root -proot -e "SELECT 1" > /dev/null 2>&1; do
            echo "MySQL not ready yet, waiting..."
            sleep 2
          done
          echo "MySQL is ready! Applying schema..."
          mysql -h mysql -u root -proot < /schema/schema.sql
          echo "Schema applied successfully!"
        volumeMounts:
        - name: schema
          mountPath: /schema
      volumes:
      - name: schema
        configMap:
          name: mysql-ingester-schema
