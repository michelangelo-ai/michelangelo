---
# Job to initialize MySQL schema for ingester
apiVersion: batch/v1
kind: Job
metadata:
  name: mysql-ingester-init
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mysql-init
          image: mysql:8
          command:
            - /bin/bash
            - -c
            - |
              echo "Waiting for MySQL to be ready..."
              for i in {1..30}; do
                if mysql -h mysql -u root -proot -e "SELECT 1" &>/dev/null; then
                  echo "MySQL is ready!"
                  break
                fi
                echo "Attempt $i: MySQL not ready, waiting..."
                sleep 2
              done
              echo "Initializing ingester schema..."
              mysql -h mysql -u root -proot < /scripts/init-schema.sql
              echo "Schema initialization complete!"
          volumeMounts:
            - name: schema-scripts
              mountPath: /scripts
      volumes:
        - name: schema-scripts
          configMap:
            name: mysql-ingester-schema
