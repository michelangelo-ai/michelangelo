apiVersion: v1
kind: Pod
metadata:
  name: cadence
  labels:
    app: cadence
spec:
  containers:
    - name: app
      image: ubercadence/server:v1.2.14-auto-setup
      env:
        - name: DB
          value: mysql
        - name: DYNAMIC_CONFIG_FILE_PATH
          value: config/dynamicconfig/development.yaml
        - name: MYSQL_SEEDS
          value: mysql
        - name: MYSQL_USER
          value: root
        - name: MYSQL_PWD
          value: root
---
apiVersion: v1
kind: Service
metadata:
  name: cadence
  labels:
    app: cadence
spec:
  type: NodePort
  selector:
    app: cadence
  ports:
    - name: "7833"
      port: 7833
      nodePort: 30002
    - name: "7933"
      port: 7933
      nodePort: 30003
---
apiVersion: v1
kind: Pod
metadata:
  name: cadence-web
  labels:
    app: cadence-web
spec:
  containers:
    - name: app
      image: ubercadence/web:v3.35.6
      env:
        - name: CADENCE_TCHANNEL_PEERS
          value: cadence:7933
---
apiVersion: v1
kind: Service
metadata:
  name: cadence-web
  labels:
    app: cadence-web
spec:
  type: NodePort
  selector:
    app: cadence-web
  ports:
    - name: "8088"
      port: 8088
      nodePort: 30004
