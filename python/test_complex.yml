# Complex ML Pipeline Example (DAG Factory Style)
# NOTE: Simplified from original - conditional and collect patterns not yet fully implemented
metadata:
  name: "complex_ml_pipeline"
  description: "Full ML pipeline with foreach pattern (simplified)"
  version: "1.0"

defaults:
  cache_enabled: true

tasks:
  # 1. Generate list of datasets (static task)
  - task_id: "discover_datasets"
    function: "example_tasks.discover_datasets"
    description: "Find available datasets"
    config:
      type: "RayTask"

  # 2. Process each dataset in parallel (foreach pattern)
  - task_id: "preprocess_datasets"
    function: "example_tasks.preprocess"
    description: "Preprocess each dataset"
    expand:
      dataset_id: "+discover_datasets"
    config:
      type: "RayTask"
      resources:
        cpu: 2
    dependencies: ["discover_datasets"]

  # 3. Merge all processed datasets
  - task_id: "merge_all_data"
    function: "example_tasks.merge_all"
    description: "Merge all preprocessed datasets"
    inputs:
      dataset_list: "+preprocess_datasets"  # Simplified - gets list of results
    config:
      type: "RayTask"
    dependencies: ["preprocess_datasets"]

  # 4. Quality check
  - task_id: "quality_check"
    function: "example_tasks.check_quality"
    description: "Check merged data quality"
    inputs:
      merged_data: "+merge_all_data"
    config:
      type: "RayTask"
    dependencies: ["merge_all_data"]

  # 5. Hyperparameter search (simplified - always executed)
  - task_id: "hyperparameter_search"
    function: "example_tasks.train_with_params"
    description: "Grid search over hyperparameters"
    expand:
      learning_rate: [0.01, 0.1]  # Single field expand
    config:
      type: "RayTask"
      resources:
        cpu: 2
        memory: "4GB"
    dependencies: ["quality_check"]

  # 6. Select best model
  - task_id: "select_best"
    function: "example_tasks.select_best"
    description: "Select best performing model"
    inputs:
      model_results: "+hyperparameter_search"  # Simplified - gets list of results
    config:
      type: "RayTask"
    dependencies: ["hyperparameter_search"]

  # 7. Final deployment
  - task_id: "deploy"
    function: "example_tasks.deploy_to_production"
    description: "Deploy the best model"
    inputs:
      best_model: "+select_best"
    config:
      type: "RayTask"
    dependencies: ["select_best"]