# Complex Pattern Example - Combines Multiple Patterns
metadata:
  name: "complex_ml_pipeline"
  description: "Full ML pipeline with foreach, conditional, and collect patterns"
  version: "1.0"

defaults:
  cache_enabled: true

tasks:
  # 1. Generate list of datasets (static task)
  discover_datasets:
    function: "example_tasks.discover_datasets"
    description: "Find available datasets"
    config:
      type: "RayTask"

  # 2. Process each dataset in parallel (foreach pattern)
  preprocess_datasets:
    function: "example_tasks.preprocess"
    description: "Preprocess each dataset"
    expand:
      dataset_id: "+discover_datasets"
    config:
      type: "RayTask"
      resources:
        cpu: 2
    dependencies: ["discover_datasets"]

  # 3. Merge all processed datasets (collect pattern)
  merge_all_data:
    function: "example_tasks.merge_all"
    description: "Merge all preprocessed datasets"
    collect:
      from: "+preprocess_datasets"
      strategy: "list"
    config:
      type: "RayTask"
    dependencies: ["preprocess_datasets"]

  # 4. Quality check for conditional logic
  quality_check:
    function: "example_tasks.check_quality"
    description: "Check merged data quality"
    inputs:
      merged_data: "+merge_all_data"
    condition:
      field: "quality_score"
      operator: ">"
      value: 0.8
    config:
      type: "RayTask"
    dependencies: ["merge_all_data"]

  # 5a. Train models if quality is good (conditional execution)
  hyperparameter_search:
    function: "example_tasks.train_with_params"
    description: "Grid search if quality is good"
    expand:
      learning_rate: [0.01, 0.1]  # Single field expand
    config:
      type: "RayTask"
      resources:
        cpu: 2
        memory: "4GB"
    when: "quality_check.condition_result == true"
    dependencies: ["quality_check"]

  # 5b. Data cleanup if quality is poor (conditional execution)
  data_cleanup:
    function: "example_tasks.advanced_cleanup"
    description: "Clean data if quality is poor"
    inputs:
      raw_data: "+merge_all_data"
    config:
      type: "RayTask"
    when: "quality_check.condition_result == false"
    dependencies: ["quality_check"]

  # 6. Select best model (collect pattern)
  select_best:
    function: "example_tasks.select_best"
    description: "Select best performing model"
    collect:
      from: "+hyperparameter_search"
      strategy: "max"
      field: "accuracy"
    config:
      type: "RayTask"
    dependencies: ["hyperparameter_search"]

  # 7. Final deployment
  deploy:
    function: "example_tasks.deploy_to_production"
    description: "Deploy the best model"
    inputs:
      best_model: "+select_best"
    config:
      type: "RayTask"
    dependencies: ["select_best"]