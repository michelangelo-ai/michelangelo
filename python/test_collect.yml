# Collect/Aggregate Pattern Example
metadata:
  name: "collect_example"
  description: "Demonstrates collect/aggregate pattern"
  version: "1.0"

tasks:
  # Generate hyperparameter combinations
  generate_hyperparams:
    function: "example_tasks.discover_datasets"  # Placeholder - returns a list
    description: "Generate hyperparameter combinations"
    config:
      type: "RayTask"

  # Dynamic task that creates multiple results
  hyperparameter_search:
    function: "example_tasks.train_with_params"
    description: "Train with different hyperparameters"
    expand:
      learning_rate: [0.001, 0.01, 0.1]  # Single field expand
    config:
      type: "RayTask"
      resources:
        cpu: 1
        memory: "2GB"

  # Collect all results and find the best one
  select_best_model:
    function: "example_tasks.select_best"
    description: "Select best model from hyperparameter search"
    collect:
      from: "+hyperparameter_search"
      strategy: "list"  # Pass all results to the task for selection
    config:
      type: "RayTask"
    dependencies: ["hyperparameter_search"]

  # Use the best model for deployment
  deploy_model:
    function: "example_tasks.deploy_to_production"
    description: "Deploy the selected best model"
    inputs:
      best_model: "+select_best_model"
    config:
      type: "RayTask"
    dependencies: ["select_best_model"]