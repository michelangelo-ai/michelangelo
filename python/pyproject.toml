[tool.poetry]
name = "michelangelo-ai"
version = "0.1.0"
description = "Michelangelo is an end-to-end model lifecycle management system at large scale"
authors = ["Michelangelo Team <michelangelo-oss-group@uber.com>"]
readme = "README.md"
exclude = ["michelangelo"]    # TODO: temporary exclude all codes in package building
packages = [
    { include = "michelangelo" },
]


[tool.poetry.dependencies]
accelerate = "0.30.1"
datasets = "3.2.0"
fsspec = "2024.9.0"
numpy = "1.23.4"
pandas = "1.5.1"
pyarrow = "^19.0.0"
pydantic = "^2.10.6"
python = "^3.9.0"
ray = "^2.41.0"
torch = "2.0.1"
transformers = "4.36.2"

[tool.poetry.group.dev.dependencies]
black = "^24.10.0"
pytest = "^8.3.4"


[tool.poetry.scripts]
ma = 'michelangelo.cli.cli:main'


[tool.black]
line-length = 120


[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
