workflow_function: uber.ai.michelangelo.sdk.workflow.defs.tabular_train.workflow_function
workflow_config: {}
task_configs:
  tabular_feature_prep:
    job_specs:
      spark:
        disable_resource_auto_scaling: ENUM_TRUE
        driver:
          pod:
            resource:
              cpu: 10
              memory: 192G
        executor:
          pod:
            resource:
              cpu: 2
              memory: 96G
          instances: 400
        spark_conf:
          spark.rpc.message.maxSize: '1024'
          spark.driver.maxResultSize: '92G'
          spark.driver.extraJavaOptions: '-Dconfig.featureJoinBatchSize=2'
          spark.peloton.disk.limit: '750000'
          spark.executor.heartbeatInterval: '300s'
          spark.sql.shuffle.partitions: '2000'
    config:
      source:
        spark_sql:
          query: >
            SELECT
              1 AS city_id,
              'model_v01' AS model_id,
              '5664200f-cba4-491e-8f5f-7f456110137b' AS client_uuid,
              13.5 AS gross_bookings_local,
              20.5 AS courier_utilized_time_min,
              '2024-02-06' AS datestr
      post_processing_module: !py_import uber.ai.michelangelo.projects.ma_dev_test_uber_one.pipelines.custom.simple.lib.simple_post_processer.SimplePostProcessor
  tabular_transform:
    job_specs:
      spark:
        disable_resource_auto_scaling: ENUM_TRUE
        driver:
          pod:
            resource:
              cpu: 10
              memory: 192G
        executor:
          pod:
            resource:
              cpu: 2
              memory: 96G
          instances: 400
        spark_conf:
          spark.rpc.message.maxSize: '1024'
          spark.driver.maxResultSize: '92G'
          spark.driver.extraJavaOptions: '-Dconfig.featureJoinBatchSize=2'
          spark.peloton.disk.limit: '750000'
          spark.executor.heartbeatInterval: '300s'
          spark.sql.shuffle.partitions: '2000'
    config:
      dsl:
        - derived_feature: "model_id_impute"
          transform: "sFill(sVal(model_id), \"missing\")"
        - derived_feature: "basket_size_bucket"
          transform: "if (nVal(gross_bookings_local) >= 50) \"50-inf\" else if (nVal(gross_bookings_local) >= 30) \"30-50\" else if (nVal(gross_bookings_local) >= 20) \"20-30\" else if (nVal(gross_bookings_local) > 0) \"0-20\" else \"missing\""
        - derived_feature: "courier_utilized_time_bucket"
          transform: "if (nVal(courier_utilized_time_min) >= 20) \"20-inf\" else if (nVal(courier_utilized_time_min) >= 14) \"14-20\" else if (nVal(courier_utilized_time_min) > 0) \"0-14\" else \"missing\""
        # - derived_feature: "eater_segment"
        #   transform: "if (sVal(@palette:eater:agg_eater_pricing:eater_segment:client_uuid:1) == \"3. high\") \"3. high\" else if (Set(\"2. sporadic\",\"lapsed\",\"hard_churned\",\"banned_or_uber_users\").contains(sVal(@palette:eater:agg_eater_pricing:eater_segment:client_uuid:1))) \"2. sporadic\" else \"1. elc\""
        # - derived_feature: "eater_tipping_history_segment"
        #   transform: "if (nFill(nVal(@palette:eater:tipping_frozen:trip_count_last_all_lookback_days:client_uuid:1), 0) < 3) \"other\" else if (nVal(@palette:eater:tipping_frozen:tip_frequency_last_10_orders:client_uuid:1) >= 0.9 && nVal(@palette:eater:tipping_frozen:tip_gb_pct_last_10_orders:client_uuid:1) < 0.1) \"frequent_low\" else if (nVal(@palette:eater:tipping_frozen:tip_frequency_last_10_orders:client_uuid:1) >= 0.9 && nVal(@palette:eater:tipping_frozen:tip_gb_pct_last_10_orders:client_uuid:1) >= 0.1 && nVal(@palette:eater:tipping_frozen:tip_gb_pct_last_10_orders:client_uuid:1) < 0.15) \"frequent_mid\" else if (nVal(@palette:eater:tipping_frozen:tip_frequency_last_10_orders:client_uuid:1) >= 0.9 && nVal(@palette:eater:tipping_frozen:tip_gb_pct_last_10_orders:client_uuid:1) >= 0.15) \"frequent_high\" else \"other\""
        # - derived_feature: "concat_key"
        #   transform: "sVal(model_id_impute) + \"|\" + sVal(basket_size_bucket) + \"|\" + sVal(courier_utilized_time_bucket) + \"|\" + sVal(eater_tipping_history_segment) + \"|\" + sVal(eater_segment)"
        # - derived_feature: "preset"
        #   transform: "nFill(nVal(@palette:category:tipping_preset_lookup:preset:concat_key:1), 0)"
  tabular_trainer:
    config:
      custom:
        train_class: !py_import uber.ai.michelangelo.projects.ma_dev_test_uber_one.pipelines.custom.simple.lib.simple_trainer.SimpleTrainer
  tabular_assembler:
    config:
      model_class: !py_import uber.ai.michelangelo.projects.ma_dev_test_uber_one.pipelines.custom.simple.lib.simple_model.SimpleModel
  tabular_inference:
    config: {}
  evaluator:
    config: {}
  pusher:
    config:
      items:
        - name: model
          model_plugin:
            model_kind: custom
            model_family: ma-dev-test-uber-simple
            model_description: "test custom model"
        - name: train_inference_result
          dataset_plugin: {}
        - name: validation_inference_result
          dataset_plugin: {}
        - name: test_inference_result
          dataset_plugin: {}
