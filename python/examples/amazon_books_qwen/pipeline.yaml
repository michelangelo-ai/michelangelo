name: amazon_books_qwen
description: Amazon Books Qwen Dual-Encoder Pipeline for GenRec+Qwen Training with Ray Distributed Training

# Qwen model specifications
qwen_specs:
  model_size: "1.5B"  # Options: 0.6B, 1.5B, 8B
  embedding_dim: 1536
  max_query_length: 128
  max_doc_length: 512
  global_batch_size: 128  # 64 per worker * 2 workers
  architecture: "GenRec+Qwen dual-encoder"

# Ray distributed training configuration
distributed_training:
  num_workers: 2
  per_worker_batch_size: 64
  use_gpu: false  # Set to true for GPU training
  resources_per_worker:
    CPU: 4
    memory: "16Gi"

# Training configuration
training:
  num_epochs: 3
  learning_rate: 2e-5
  temperature: 0.05
  negative_ratio: 1.0
  enable_bf16: true

# Data splits
data:
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15
  sample_size: 1000  # For development, remove for full dataset

# Ray configuration
ray:
  head_cpu: 4
  head_memory: "32Gi"
  worker_instances: 2  # Distributed across 2 workers
  worker_cpu: 4
  worker_memory: "32Gi"