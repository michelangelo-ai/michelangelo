# Conditional (If-Else) Pattern Example (DAG Factory Style)
# NOTE: Full conditional logic not yet implemented in explicit generation
metadata:
  name: "conditional_example"
  description: "Demonstrates quality check workflow (simplified)"
  version: "1.0"

tasks:
  # Task that produces data for condition evaluation
  - task_id: "create_test_data"
    function: "example_tasks.merge_all"
    description: "Create test data for quality check"
    inputs:
      dataset_list: '[{"total_samples": 5000, "total_features": 100}]'
    config:
      type: "RayTask"

  # Check data quality
  - task_id: "check_data_quality"
    function: "example_tasks.check_quality"
    description: "Check data quality to decide next step"
    inputs:
      merged_data: "+create_test_data"
    config:
      type: "RayTask"
    dependencies: ["create_test_data"]

  # Train model based on quality result (simplified - always executed)
  - task_id: "train_model"
    function: "example_tasks.train_model"
    description: "Train model with data"
    inputs:
      training_data: "+check_data_quality"
      model_type: "bert"
    config:
      type: "RayTask"
      resources:
        cpu: 4
        memory: "8GB"
    dependencies: ["check_data_quality"]